[project]
name = "ops_dashboard"
version = "1.0.0"
description = "Operations dashboard demonstrating COMMAND_CENTER archetype"
root = "ops_dashboard.core"

[dsl]
paths = ["dsl/"]

[stack]
name = "dnr"

[ui]
# v0.61.36: use the linear-dark app-shell theme — Linear-vocabulary
# (cool slate ramp, cyan accent, dense, dark-first) for the operator
# persona that lives in this dashboard.
theme = "linear-dark"

[auth]
enabled = true
provider = "session"
allow_registration = true

# Dev-time cognition (qa trial, spec analysis) bills the Claude
# subscription via the Claude Code CLI — no API key needed. Deploys
# need ANTHROPIC_API_KEY + "anthropic-api" (docs/reference/llm-drivers.md).
[llm]
driver = "claude-cli"
