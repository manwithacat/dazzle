# Dazzle Manifest - LLM Ticket Classifier Example
# Demonstrates LLM Jobs as First-Class Events (Issue #33)

[project]
name = "llm_ticket_classifier"
version = "0.1.0"
root = "llm_ticket_classifier"

[modules]
paths = ["./dsl"]

[stack]
name = "dnr"

[auth]
enabled = true
provider = "session"
allow_registration = true

[theme]
preset = "saas-default"

# Dev-time cognition (qa trial, spec analysis) bills the Claude
# subscription via the Claude Code CLI — no API key needed. Deploys
# need ANTHROPIC_API_KEY + "anthropic-api" (docs/reference/llm-drivers.md).
[llm]
driver = "claude-cli"
