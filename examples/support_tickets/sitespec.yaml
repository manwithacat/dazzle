version: 1

brand:
  product_name: "Support Tickets"
  tagline: "Track and resolve customer issues efficiently"
  company_legal_name: "Support Tickets Demo"
  support_email: "support@example.com"

pages:
  - route: "/"
    type: landing
    sections:
      - type: hero
        headline: "Customer Support Made Simple"
        subhead: "Track tickets, manage SLAs, and resolve issues faster with our support system."
        primary_cta:
          label: "Get Started"
          href: "/login"
  # Public cookie policy (served from site/content/; source of truth is
  # docs/privacy/cookie_policy.md from `dazzle compliance privacy`).
  - route: "/cookies"
    type: markdown
    title: "Cookie Policy"
    source:
      format: md
      path: legal/cookies.md

# De-facto mandatory SaaS legal surfaces. Content lives under
# site/content/legal/ (SiteSpec path convention). Keep in sync with the
# compliance pack at docs/privacy/ (regenerated from pii() + subprocessor DSL).
legal:
  privacy:
    route: "/privacy"
    source:
      format: md
      path: legal/privacy.md

layout:
  nav:
    public:
      - label: "Home"
        href: "/"
      - label: "Sign In"
        href: "/login"
  footer:
    columns:
      - title: Legal
        links:
          - label: "Privacy"
            href: "/privacy"
          - label: "Cookies"
            href: "/cookies"
    disclaimer: "Support Tickets Demo"

auth_pages:
  login:
    route: "/login"
    mode: generated
    enabled: true
  signup:
    route: "/signup"
    mode: generated
    enabled: true
