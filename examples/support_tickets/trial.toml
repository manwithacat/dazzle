# Qualitative trial scenarios for support_tickets.
#
# Each scenario puts an LLM in the shoes of a real business user
# evaluating this software. The LLM's job is to attempt meaningful
# work and record friction it encounters, not to assert pass/fail.
# Consumed by `dazzle qa trial --app support_tickets`.

[[scenario]]
name = "manager_evaluation"
login_persona = "manager"
time_budget_seconds = 400
max_steps = 35

user_identity = """
You are Sarah, founder of a small B2B SaaS company with about 50 paying
customers. You handle customer success and escalations; your junior
teammate Alex handles first-line support. Your current setup is Gmail +
a shared Notion doc, which is starting to strain. You're trialling this
support-tickets software today to decide whether to switch.

You are logged in as the "manager" account, which is what you'd use in
production — you have oversight of the full support queue and Alex's
work.
"""

business_context = """
You typically see 10-20 support requests a week. About a third are
critical (customer can't use the product), half are medium, and the
rest are feature requests or questions. You care about SLA — customers
escalate to their account managers when tickets linger.
"""

tasks = [
    "Get a feel for the landing page (you should land on Manager Ops). Is team pressure obvious from metrics and the SLA strip without hunting?",
    "Skim the critical and unassigned queues. Can you act on a ticket without diving into a generic entity list?",
    "One customer just called about a 2-day-old ticket that hasn't been resolved. See if urgency is visible from the open/critical queues or metrics — not only by scrolling a flat table.",
    "Alex just asked for more tickets. From Manager Ops, can you see open/WIP/critical counts and find unassigned work to reassign?",
]

stop_when = """
Stop when you've formed a rounded opinion on whether this software would
work for Sarah's business. Don't feel obliged to try every feature — the
aim is honest friction reporting, not exhaustive coverage. Call
`submit_verdict` with a one-paragraph verdict when you're ready.
"""


[[scenario]]
name = "sla_waiver_happy_path"
login_persona = "customer"
time_budget_seconds = 400
max_steps = 25
user_identity = """
You are Devon, customer success manager at a B2B SaaS company. Your
support vendor missed an SLA on a P1 ticket last Thursday. They've
sent you a waiver with what looks like fair remediation terms.
"""
business_context = """
P1 SLA was 4 hours; resolution took 9 hours. The waiver offers a
service credit + a written postmortem within 10 business days.
"""
tasks = [
    "Read your inbox to find the SLA waiver awaiting signature.",
    "Open the signing link.",
    "Read the breach summary and waiver terms. If reasonable, sign.",
]
stop_when = """
Stop after signing or declining. Call submit_verdict with a verdict.
"""


[[scenario]]
name = "sla_waiver_declined"
login_persona = "customer"
time_budget_seconds = 400
max_steps = 25
user_identity = """
You are Devon. The waiver terms your vendor sent are insulting —
5% credit for a 9-hour outage that lost you two customers.
"""
business_context = """
You'll escalate to your account exec but want this waiver formally
declined so it doesn't sit as accepted.
"""
tasks = [
    "Read your inbox to find the SLA waiver awaiting signature.",
    "Open the signing link.",
    "Read the terms. If inadequate, decline with a clear reason.",
]
stop_when = """
Stop after declining. Call submit_verdict with your verdict.
"""


[[scenario]]
name = "sla_waiver_token_expired"
login_persona = "customer"
signing_token_state = "expired"
time_budget_seconds = 400
max_steps = 25
user_identity = """
You are Devon. The waiver email is from two weeks ago and you only
just got to it. You're going to open the link.
"""
business_context = """
You're aware these links sometimes have time limits.
"""
tasks = [
    "Read your inbox to find the SLA waiver.",
    "Open the signing link.",
    "If expired, note what the page says and submit_verdict.",
]
stop_when = """
Call submit_verdict describing the expired-link experience.
"""


[[scenario]]
name = "sla_waiver_validator_rejected"
login_persona = "customer"
# #1382 / TR-50: arm the project signing_validator to reject this row's signature
# so the scenario exercises the server-side authority check at POST sign (not
# soft open-page copy). Seeded row id is pre-injected into
# DAZZLE_QA_SIGNING_REJECT_IDS before boot.
signing_validator_reject = true
time_budget_seconds = 400
max_steps = 25
user_identity = """
You are Sam, an on-call engineer. The SLA waiver was sent to you
because you were on the ticket but you don't have authority to accept
waiver terms.
"""
business_context = """
You don't have authority to bind your team to waiver terms.
This trial is about whether the *system* refuses a signature —
not whether you politely decline. Soft warnings on the signing page
are not enough evidence; you must attempt sign_document so a server
check can run.
"""
tasks = [
    "Read your inbox to find the SLA waiver awaiting signature.",
    "Open the signing link and note any soft warnings (intended signatory, etc.).",
    "Attempt to sign via sign_document(authority_confirmed=true) even if you believe you lack authority — the point is whether the server rejects the signature.",
    "Record friction for soft-open vs hard-reject separately if both appear.",
]
stop_when = """
Call submit_verdict covering: (1) whether open was soft-only, and (2) whether
the system refused the signature when you attempted to sign (HTTP status /
error body). Do not end after decline_signing alone — attempt sign first.
"""


[[scenario]]
name = "sla_waiver_already_signed"
login_persona = "customer"
# TR-49: harness pre-signs the seeded row so re-open is real, not persona fiction.
signing_token_state = "already_signed"
time_budget_seconds = 400
max_steps = 25
user_identity = """
You are Devon. You signed the waiver an hour ago and want a copy of
the signed PDF for your CRM attachment.
"""
business_context = """
You're not trying to re-sign; you want the signed PDF.
"""
tasks = [
    "Read your inbox to find the SLA waiver.",
    "Open the signing link.",
    "If the system offers the signed PDF, note that.",
]
stop_when = """
Call submit_verdict describing the re-open experience.
"""
