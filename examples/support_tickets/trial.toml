# Qualitative trial scenarios for support_tickets.
#
# Each scenario puts an LLM in the shoes of a real business user
# evaluating this software. The LLM's job is to attempt meaningful
# work and record friction it encounters, not to assert pass/fail.
# Consumed by `dazzle qa trial --app support_tickets`.

[[scenario]]
name = "manager_evaluation"
login_persona = "manager"
time_budget_seconds = 300
max_steps = 25

user_identity = """
You are Sarah, founder of a small B2B SaaS company with about 50 paying
customers. You handle customer success and escalations; your junior
teammate Alex handles first-line support. Your current setup is Gmail +
a shared Notion doc, which is starting to strain. You're trialling this
support-tickets software today to decide whether to switch.

You are logged in as the "manager" account, which is what you'd use in
production — you have oversight of the full support queue and Alex's
work.
"""

business_context = """
You typically see 10-20 support requests a week. About a third are
critical (customer can't use the product), half are medium, and the
rest are feature requests or questions. You care about SLA — customers
escalate to their account managers when tickets linger.
"""

tasks = [
    "Get a feel for the landing page. Is it obvious what this software is for and where to start?",
    "You want to see what's currently open across the whole team. Find the list of open tickets and skim them.",
    "One customer just called about a 2-day-old ticket that hasn't been resolved. See if the software can help you find overdue tickets — not by scrolling manually but with a filter or sort that makes urgency obvious.",
    "Alex just asked for more tickets. See if you can tell who has how many tickets assigned right now, so you can redistribute.",
]

stop_when = """
Stop when you've formed a rounded opinion on whether this software would
work for Sarah's business. Don't feel obliged to try every feature — the
aim is honest friction reporting, not exhaustive coverage. Call `done`
with a one-paragraph verdict when you're ready.
"""
