version: 1

brand:
  product_name: "Simple Task"
  tagline: "Track your tasks with ease"
  company_legal_name: "Simple Task Demo"
  support_email: "support@example.com"

pages:
  - route: "/"
    type: landing
    sections:
      - type: hero
        headline: "Simple Task Management"
        subhead: "A straightforward way to track what needs to be done."
        primary_cta:
          label: "Get Started"
          href: "/login"
  - route: "/cookies"
    type: markdown
    title: "Cookie Policy"
    source:
      format: md
      path: legal/cookies.md

# Public legal pages; content from `dazzle compliance privacy` → docs/privacy/
# (also --sync-site to site/content/legal/).
legal:
  privacy:
    route: "/privacy"
    source:
      format: md
      path: legal/privacy.md

layout:
  nav:
    public:
      - label: "Home"
        href: "/"
      - label: "Sign In"
        href: "/login"
  footer:
    columns:
      - title: Legal
        links:
          - label: "Privacy"
            href: "/privacy"
          - label: "Cookies"
            href: "/cookies"
    disclaimer: "Simple Task Demo"

auth_pages:
  login:
    route: "/login"
    mode: generated
    enabled: true
  signup:
    route: "/signup"
    mode: generated
    enabled: true
