name: Setup Dazzle
description: |
  Set up Python with pip cache and install Dazzle editable with the
  requested extras. Centralises the 8× duplication previously in
  ci.yml so that drift between jobs (missing `mcp` extra in one place,
  missing `mobile` in another) can't happen.

  IMPORTANT: this is a *local* composite action, so the calling job
  MUST check out the repo before invoking it — otherwise the runner
  can't find this action.yml file (the chicken-and-egg gotcha for
  every local composite):

    steps:
      - uses: actions/checkout@<sha>  # v6 — required FIRST (see note above)
      - uses: ./.github/actions/setup-dazzle

  Override extras when a job needs a different superset:

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,llm,mcp,mobile,postgres,pitch,i18n,viewport
        optional-pip: pygls bleach

inputs:
  python-version:
    description: Python version passed to actions/setup-python
    required: false
    default: "3.12"
  extras:
    description: Comma-separated pip extras for `pip install -e ".[<extras>]"`
    required: false
    # `perf` is in the default set because `dazzle.cli` imports
    # `dazzle.perf` at module load (tracer init at CLI entry, #1158), so
    # opentelemetry must be present for the test suite to even collect.
    # `saml` (python3-saml; prebuilt xmlsec wheel on linux, no apt needed) is in
    # the default so the SAML provider + IdP-metadata tests run in CI instead of
    # skipping on a missing `onelogin` import (#1345).
    default: dev,llm,mcp,mobile,postgres,perf,saml
  optional-pip:
    description: |
      Space-separated package list installed best-effort after the editable
      install (failures swallowed via `|| true`). Used for packages that
      aren't in any extra (e.g. pygls for the LSP). Pass an empty string
      to skip.
    required: false
    default: pygls

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install Dazzle (extras=${{ inputs.extras }})
      shell: bash
      env:
        EXTRAS: ${{ inputs.extras }}
        OPTIONAL_PIP: ${{ inputs.optional-pip }}
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[${EXTRAS}]"
        if [ -n "$OPTIONAL_PIP" ]; then
          # Best-effort: never fail the build on optional tooling.
          pip install $OPTIONAL_PIP || true
        fi
