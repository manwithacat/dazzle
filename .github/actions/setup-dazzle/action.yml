name: Setup Dazzle
description: |
  Checkout repo, set up Python with pip cache, and install Dazzle editable
  with the requested extras. Centralises the 8× duplication previously in
  ci.yml so that drift between jobs (missing `mcp` extra in one place,
  missing `mobile` in another) can't happen.

  Use from a job's first step:

    - uses: ./.github/actions/setup-dazzle

  Override extras when a job needs a different superset:

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,llm,mcp,mobile,postgres,pitch,i18n,viewport
        optional-pip: pygls bleach

inputs:
  python-version:
    description: Python version passed to actions/setup-python
    required: false
    default: "3.12"
  extras:
    description: Comma-separated pip extras for `pip install -e ".[<extras>]"`
    required: false
    default: dev,llm,mcp,mobile,postgres
  optional-pip:
    description: |
      Space-separated package list installed best-effort after the editable
      install (failures swallowed via `|| true`). Used for packages that
      aren't in any extra (e.g. pygls for the LSP). Pass an empty string
      to skip.
    required: false
    default: pygls

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install Dazzle (extras=${{ inputs.extras }})
      shell: bash
      env:
        EXTRAS: ${{ inputs.extras }}
        OPTIONAL_PIP: ${{ inputs.optional-pip }}
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[${EXTRAS}]"
        if [ -n "$OPTIONAL_PIP" ]; then
          # Best-effort: never fail the build on optional tooling.
          pip install $OPTIONAL_PIP || true
        fi
