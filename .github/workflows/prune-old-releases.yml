name: Prune old patch releases

# Keep the public record tidy: on each minor/major release (vX.Y.0), delete patch
# tags + GitHub Releases whose minor series has fallen outside the most recent 5.
# Minor/major anchors (vX.Y.0) are kept forever; underlying commits stay on `main`,
# and the script writes a tag→SHA backup before deleting (recoverable). Full
# rationale: scripts/prune_old_patch_releases.py docstring.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      keep_minors:
        description: 'How many recent minor series to protect'
        required: false
        default: '5'

permissions:
  contents: write  # delete tags + GitHub Releases

jobs:
  prune:
    runs-on: ubuntu-latest
    # Only on minor/major anchors (patch == 0) — see publish-pypi.yml for the
    # `endsWith('.0')` rationale (multi-digit patches end in "10"/"20", not ".0").
    if: github.event_name == 'workflow_dispatch' || endsWith(github.ref, '.0')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # need all tags
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'
      - name: Prune old patch tags + releases
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_MINORS: ${{ github.event.inputs.keep_minors || '5' }}
        run: |
          git fetch --tags --force
          python scripts/prune_old_patch_releases.py --keep-minors "$KEEP_MINORS" --execute
