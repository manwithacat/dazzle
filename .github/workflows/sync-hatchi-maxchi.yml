# Continuous sync: any push to main that touches packages/hatchi-maxchi/**
# re-splits the package history and pushes it to the standalone repo
# (github.com/manwithacat/hatchi-maxchi). The standalone repo's own CI
# then gates the sync (contract / behaviour / visual / WCAG).
#
# After push, this workflow **waits for hatchi-maxchi CI** and fails if
# red — so a green "Sync HaTchi-MaXchi" on Dazzle means the standalone
# repo accepted the tip. Mirror check also runs on every Dazzle CI
# (job hm-standalone-ci → scripts/hm_standalone_ci_status.py).
#
# Releases stay DELIBERATE and are cut on the standalone repo (release.yml
# there: push a v* tag, or run its workflow_dispatch with a version input).
#
# Auth: HM_SYNC_DEPLOY_KEY — an SSH deploy key scoped to write on the
# hatchi-maxchi repo only (Settings → Deploy keys there; private half in
# this repo's Actions secrets). Status poll uses the public Actions API
# (optional GITHUB_TOKEN for rate limits).
name: Sync HaTchi-MaXchi

on:
  push:
    branches: [main]
    paths: ["packages/hatchi-maxchi/**"]
  workflow_dispatch:

# Queue, never cancel: each sync must land in order (fast-forward pushes).
concurrency:
  group: hm-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      # Tip of packages/hatchi-maxchi after the push (subtree split SHA ==
      # commit that lands on hatchi-maxchi main when fast-forward succeeds).
      hm_tip_sha: ${{ steps.push.outputs.hm_tip_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # subtree split walks the full history
      - name: Split package history and push to standalone repo
        id: push
        env:
          HM_SYNC_DEPLOY_KEY: ${{ secrets.HM_SYNC_DEPLOY_KEY }}
        run: |
          if [ -z "$HM_SYNC_DEPLOY_KEY" ]; then
            echo "::error::HM_SYNC_DEPLOY_KEY secret is not set — add the deploy key (see workflow header)"; exit 1
          fi
          git config user.name "dazzle-hm-sync[bot]"
          git config user.email "noreply@github.com"
          BRANCH_SHA=$(git subtree split --prefix=packages/hatchi-maxchi)
          echo "split -> $BRANCH_SHA"
          mkdir -p ~/.ssh
          printf '%s\n' "$HM_SYNC_DEPLOY_KEY" > ~/.ssh/hm_sync
          chmod 600 ~/.ssh/hm_sync
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/hm_sync -o IdentitiesOnly=yes"
          HM_URL=git@github.com:manwithacat/hatchi-maxchi.git

          # Fast-forward is the common case (HM main unchanged since the last sync).
          if git push "$HM_URL" "$BRANCH_SHA:refs/heads/main"; then
            echo "sync: fast-forward push ok"
            echo "hm_tip_sha=$BRANCH_SHA" >> "$GITHUB_OUTPUT"
          else
            # HM main diverged — a trusted party committed directly to the standalone
            # repo (e.g. a README edit). Instead of failing (or force-pushing, which
            # would clobber their work), merge the monorepo split INTO HM's current
            # main, PRESERVING those trusted edits on conflict (`-X ours` = HM's side
            # wins conflicts). Monorepo changes to files HM did not touch still flow
            # through; only files edited on BOTH sides keep HM's version. Never fails
            # on divergence, never clobbers trusted local edits. (Policy: only trusted
            # parties commit directly to HM, and for minor/meta changes — code flows
            # from the monorepo. Confirmed 2026-07-09.)
            echo "sync: HM main diverged — merging (trusted local edits preserved)"
            git fetch "$HM_URL" main
            git checkout -B hm-sync FETCH_HEAD
            git merge --no-edit -X ours "$BRANCH_SHA" \
              -m "sync: merge monorepo packages/hatchi-maxchi (preserve trusted HM edits)"
            git push "$HM_URL" hm-sync:refs/heads/main
            # Tip after merge is the merge commit on hm-sync
            echo "hm_tip_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  # Transitive gate: do not leave "Sync HaTchi-MaXchi" green while the
  # standalone repo's CI is red for the tip we just pushed.
  wait-hm-ci:
    name: Wait for hatchi-maxchi CI
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Poll standalone CI until green (or fail)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HM_TIP: ${{ needs.sync.outputs.hm_tip_sha }}
        run: |
          set -euo pipefail
          # Give Actions a moment to create the workflow run on HM.
          sleep 15
          # Prefer the tip SHA when known; fall back to latest main run.
          if [ -n "${HM_TIP:-}" ]; then
            python scripts/hm_standalone_ci_status.py --sha "$HM_TIP" --wait 900 --poll 25
          else
            python scripts/hm_standalone_ci_status.py --wait 900 --poll 25
          fi
