name: CI

on:
  push:
    branches: [ main, develop ]
    # Skip CI for pure-docs changes. Anything that touches runtime/code/
    # test paths still triggers the full matrix. `.claude/CLAUDE.md` is
    # NOT in this list because test_docs_drift.py reads it and would
    # regress silently. Same caution for homebrew/ which is gated by
    # homebrew-validation here in CI.
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'docs/**'
      - 'dev_docs/**'
      - 'examples/**/README.md'
      - 'fixtures/**/README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'docs/**'
      - 'dev_docs/**'
      - 'examples/**/README.md'
      - 'fixtures/**/README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

# Cancel previously-running CI when a new commit arrives on the same ref.
# Pushing three commits in a minute previously ran three full matrices
# in parallel; now only the latest survives. Matches the pattern already
# in ai-coauthor-check.yml.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-tests:
    name: Python Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Full support matrix, all hard-required. 3.12 = floor; 3.14 = the
        # primary deploy/runtime target (Heroku's default; ~5% faster on the
        # CPU/parse path via the uv tail-call interpreter — see
        # docs/python-3.14-primary-target.md). 3.14 was promoted from an
        # allow-failure cell once its two non-Dazzle reds were cleared: the
        # pygls `asyncio.iscoroutinefunction` deprecation is scope-ignored in
        # the LSP import test, and `typing.ForwardRef` rendering is normalised
        # via `__forward_arg__` so the api-surface baseline is interpreter-
        # stable. uv provisions each interpreter via the composite `--python`.
        # lint/type-check stay 3.12-pinned — they govern which syntax the floor
        # permits, not which interpreter runs.
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        python-version: "${{ matrix.python-version }}"

    - name: Build asset bundles
      # #1052: dist/dazzle.min.{css,js} + dazzle-icons.min.js are
      # gitignored; build them here so the static-mount + any
      # bundle-shape tests have the artifacts on disk.
      run: python scripts/build_dist.py

    - name: Run tests with pytest
      run: |
        pytest -v --cov=src/dazzle --cov-report=xml --cov-report=term-missing -m "not e2e"

    - name: Sentinel Python audit on examples (PA-LLM-07+)
      # #1256: PA-LLM-07 promoted from informational to blocker. Backfill
      # audit confirmed zero hits across example apps. `--severity medium`
      # now gates on PA-LLM-07 (MEDIUM) plus PA-LLM-08/09/10 and any other
      # MEDIUM+ heuristic. Step fails on any finding (no `|| echo` swallow).
      # See docs/counter-priors/exceptions-as-control-flow.md.
      run: |
        for dir in examples/*/; do
          if [ -f "${dir}dazzle.toml" ] && [ "$(basename $dir)" != "pra" ]; then
            echo "=== sentinel: $(basename $dir) ==="
            cd "$dir"
            python -m dazzle sentinel scan --agent PA --severity medium
            cd "$GITHUB_WORKSPACE"
          fi
        done

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,mobile,postgres,perf
        optional-pip: ""

    # NOTE: the security *unit* tests (test_jwt_security, test_input_sanitization,
    # tests/security/ ASVS, test_rbac_*) are NOT re-run here — the `python-tests`
    # job already runs them via `pytest -m "not e2e"` (testpaths includes
    # tests/ + tests/security/) across the full 3.12/3.13/3.14 matrix, in an
    # extras superset of this job. Re-running them here was pure duplication
    # (4× total). This job now owns only the gates that base CANNOT cover:
    # the e2e-marked fuzzer below, the RBAC-matrix CLI gate, bandit SAST, and
    # pip-audit. (Consolidation 2026-06-24.)

    - name: Run JWT fuzzing tests
      # `@pytest.mark.e2e` → excluded from the base `-m "not e2e"` run, so this
      # is the only place it executes. Kept here deliberately.
      run: |
        pytest tests/unit/test_jwt_fuzzing.py -v --tb=short

    - name: Validate Shapes RBAC matrix (security gate)
      run: |
        cd fixtures/shapes_validation
        python -m dazzle rbac matrix --format json > /tmp/rbac-matrix.json
        python3 -c "
        import json, sys
        matrix = json.load(open('/tmp/rbac-matrix.json'))
        cells = matrix['cells']
        unprotected = [c for c in cells if c['decision'] == 'PERMIT_UNPROTECTED']
        if unprotected:
            for c in unprotected[:5]:
                print(f'FAIL: {c[\"role\"]} / {c[\"entity\"]} / {c[\"operation\"]} is UNPROTECTED')
            sys.exit(1)
        deny = sum(1 for c in cells if c['decision'] == 'DENY')
        allow = sum(1 for c in cells if c['decision'] in ('PERMIT', 'PERMIT_FILTERED'))
        print(f'RBAC matrix OK: {len(cells)} cells, {allow} permitted, {deny} denied, 0 unprotected')
        "

    - name: Run bandit security scanner
      # Path fix (2026-06-24): the back→http rename (ADR-0041) left this pointing
      # at the nonexistent `src/dazzle_http/runtime/`, so bandit skipped the dir
      # and exited 0 — a silent no-op SAST gate since 2026-06-20. The HTTP runtime
      # lives at `src/dazzle/http/runtime/`.
      run: |
        uv pip install bandit[toml]
        bandit -c pyproject.toml -r src/dazzle/http/runtime/ --severity-level medium

    - name: Run pip-audit (hard-fail on findings)
      # Hard-fails the build on any known vulnerability in the resolved
      # dependency tree (closes #1200; was advisory-only with `|| true` +
      # `continue-on-error: true`). The `setup-dazzle` composite syncs into
      # a uv venv that has NO `pip` installed, so pip's own CVEs
      # (CVE-2025-8869, CVE-2026-1703, CVE-2026-3219, CVE-2026-6357 — all in
      # pip <26.1) don't surface here at all. `uv pip freeze` reads the
      # synced tree without needing pip in the environment.
      #
      # We audit a `uv pip freeze --exclude-editable` snapshot with
      # `--no-deps --disable-pip` rather than the live env: pip-audit
      # 2.10.0 errors out on the editable `dazzle-dsl` install itself
      # (cannot resolve editable distributions on PyPI), and its
      # `--skip-editable` flag does NOT suppress this error — it only
      # suppresses the audit for editables that successfully enumerate.
      # Freezing the resolved tree first, then telling pip-audit not to
      # re-resolve, sidesteps that entirely while still auditing every
      # transitive dep.
      #
      # If a future CVE genuinely cannot be bumped, add
      # `--ignore-vuln <GHSA-or-CVE-id>` with a rationale comment + a
      # CHANGELOG `### Agent Guidance` entry naming the condition to
      # remove it.
      #
      # MAL-2026-4750 is suppressed (#1278): Amazon Inspector flagged
      # fastapi 0.136.3 for declaring `fastar>=0.9.0` in its [standard]
      # extra. Investigation confirmed `fastar` is a legitimate Rust-
      # tar binding used by fastapi-cloud-cli to write zstd-compressed
      # upload bundles (`with fastar.open(tar_path, "w:zst", ...)`).
      # The name is `fast`+`tar`, not a typosquat. fastapi 0.136.3
      # also ships a parallel `standard-no-fastapi-cloud-cli` extras
      # group that opts out of cloud-cli + fastar — clear evidence of
      # deliberate design, not malicious insertion. We don't take
      # fastapi[standard] anywhere in our deps, so we never install
      # fastar. Remove this suppression if/when Inspector retracts
      # the advisory.
      run: |
        uv pip install pip-audit
        uv pip freeze --exclude-editable > /tmp/audit-reqs.txt
        pip-audit --strict --desc --no-deps --disable-pip \
          --ignore-vuln MAL-2026-4750 \
          -r /tmp/audit-reqs.txt

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,llm,mcp,postgres,perf

    - name: Run ruff linter
      run: |
        ruff check src/ tests/

    - name: Run ruff formatter check
      run: |
        ruff format --check src/ tests/

    - name: CSS clip-check (framework bundle regression gate, issue 937)
      run: python scripts/css_clip_check.py

    - name: CSS raw-ramp check (component CSS dark-mode contract, issue 942)
      run: python scripts/css_raw_ramp_check.py

    - name: Run bandit security check
      run: |
        uv pip install bandit[toml]
        bandit -c pyproject.toml -r src/ --severity-level medium

    # NOTE: the former "Check DSL files (strict mode)" step was removed in
    # v0.71.98 (#1183). It called `dazzle validate --strict` — a flag that
    # never existed — under a `|| echo` that swallowed the error, so it was a
    # permanent no-op. Real per-example/fixture `dazzle validate` gating
    # already runs in the e2e-smoke job's "Validate all example and fixture
    # projects" step (which also correctly skips the pra conformance corpus).

    - name: Fragment audit (per example, advisory)
      run: |
        # Plan 14 closed the REF field-type gap; v0.66.59 surfaced
        # workspace-region display-mode gaps (~50 surfaces blocked
        # cross-app). Reverted from --fail-on-blocked (strict) to
        # advisory while Phase 4A adapter dispatch on display modes
        # lands. Once kanban/timeline/grid/etc. are covered, the
        # gate tightens back to --fail-on-blocked.
        for dir in examples/simple_task examples/contact_manager examples/support_tickets examples/ops_dashboard examples/fieldtest_hub; do
          if [ -d "${dir}/dsl" ]; then
            echo "=== fragment-audit: $dir ==="
            python -m dazzle fragment-audit "$dir" || echo "Note: audit reported blockers in $dir (advisory)"
          fi
        done

    - name: Framework artefact coverage gate
      run: |
        # Locks the "every shipped artefact has a live consumer" invariant
        # established in v0.57.35. Any new DSL construct, DisplayMode,
        # or fragment template landing without at least one example app
        # exercising it fails CI here. See src/dazzle/cli/coverage.py.
        python -m dazzle coverage --fail-on-uncovered

    - name: Generate and validate AsyncAPI specs
      run: |
        # Install AsyncAPI CLI for validation
        npm install -g @asyncapi/cli

        # Generate and validate AsyncAPI for each example and fixture
        for dir in examples/*/ fixtures/*/; do
          if [ -f "${dir}dazzle.toml" ]; then
            example=$(basename "$dir")
            echo "Generating AsyncAPI for $example..."
            cd "$dir"
            python -m dazzle specs asyncapi -f json -o asyncapi.json || echo "Note: No AsyncAPI output for $example"

            # Validate the generated AsyncAPI spec
            if [ -f asyncapi.json ]; then
              echo "Validating AsyncAPI spec for $example..."
              asyncapi validate asyncapi.json || echo "Warning: AsyncAPI validation issues in $example"
              rm asyncapi.json
            fi
            cd "$GITHUB_WORKSPACE"
          fi
        done

  type-check:
    runs-on: ubuntu-latest

    steps:
    # type-check needs the maximal extras superset — when babel /
    # python-pptx / Pillow aren't installed, mypy treats their imports
    # as `Any` (ignore_missing_imports=true) and the `warn_return_any`
    # + `warn_unused_ignores` flags fire on functions that wrap them.
    # Matching the dev-install superset keeps the type-check env
    # identical to local mypy.
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,llm,mcp,mobile,postgres,pitch,i18n,viewport,perf,lsp

    - name: Run mypy
      # #1056 (v0.67.99): full mypy check across the merged dazzle/
      # package. Baseline previously sat at 46 errors that masked real
      # type bugs; burned down to 0 in v0.67.99. New errors fail CI.
      run: mypy src/dazzle

  integration:
    runs-on: ubuntu-latest
    needs: [python-tests, lint, security-tests]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,llm,mcp,mobile,perf,saml  # +saml: run test_saml_routes in CI (#1345)

    - name: Build asset bundles
      # #1052: dist/dazzle.min.* are gitignored — built here for tests.
      run: python scripts/build_dist.py

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --maxfail=1 -m "not e2e" --cov=src/dazzle --cov-report=xml

    - name: Test CLI commands
      run: |
        python -m dazzle --help
        python -m dazzle --version

    - name: Upload coverage to Codecov
      # #1169: integration tests run in-process (TestClient) and exercise
      # serve-boot orchestration + route handlers the unit job never
      # reaches. Uploaded under its own `integration` flag — Codecov
      # merges flagged reports into the project total.
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6
      with:
        files: ./coverage.xml
        flags: integration
        fail_ci_if_error: false

  # Smoke tests: validate all examples parse + lint, run moved test_serve_validation.py
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: [python-tests, lint]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,llm,mcp,mobile,perf
        optional-pip: ""

    - name: Validate all example and fixture projects
      run: |
        # fixtures/pra is the parser-conformance corpus — intentionally
        # contains validation-failing shapes (HLESS decimal-on-monetary,
        # unreachable entities, broken FK chains, etc.) used to exercise
        # the parser/validator paths. It MUST fail `dazzle validate`.
        # Same convention as the example-apps `/improve` lane which
        # excludes pra. The remaining fixtures (shapes_validation,
        # rbac_validation, investigator_smoke) are framework-validation
        # probes, not user-facing apps.
        for dir in examples/*/ fixtures/*/; do
          if [ -f "${dir}dazzle.toml" ]; then
            example=$(basename "$dir")
            if [ "$example" = "pra" ]; then
              echo "Skipping $example (parser-conformance corpus)"
              continue
            fi
            echo "Validating $example..."
            cd "$dir"
            python -m dazzle validate
            cd "$GITHUB_WORKSPACE"
          fi
        done

    - name: Lint all example DSL files
      run: |
        for dir in examples/*/ fixtures/*/; do
          if [ -f "${dir}dazzle.toml" ]; then
            example=$(basename "$dir")
            echo "Linting $example..."
            cd "$dir"
            python -m dazzle lint || echo "Note: Lint warnings in $example"
            cd "$GITHUB_WORKSPACE"
          fi
        done

    - name: Run serve validation tests
      run: |
        pytest tests/integration/test_serve_validation.py -v --timeout=60
      timeout-minutes: 3

  # PostgreSQL unit tests
  postgres-tests:
    name: PostgreSQL Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dazzle
          POSTGRES_PASSWORD: dazzle_test
          POSTGRES_DB: dazzle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dazzle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle

    - name: Build asset bundles
      # #1052: dist/dazzle.min.* are gitignored — built here for tests.
      run: python scripts/build_dist.py

    - name: Run PostgreSQL-specific tests
      env:
        DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
        TEST_DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
      run: |
        pytest -v -m "postgres" -x --cov=src/dazzle --cov-report=xml

    - name: Upload coverage to Codecov
      # #1169: the postgres-marked tests exercise real-DB code paths
      # (migrations, scope SQL, repository internals) invisible to the
      # SQLite-free unit job. Uploaded under the `postgres` flag.
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6
      with:
        files: ./coverage.xml
        flags: postgres
        fail_ci_if_error: false

  # Runtime E2E: CRUD tests + Tier 1 DSL tests against PostgreSQL
  e2e-runtime:
    name: E2E Runtime (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [python-tests, lint, security-tests]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dazzle
          POSTGRES_PASSWORD: dazzle_test
          POSTGRES_DB: dazzle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dazzle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
      DAZZLE_SKIP_INFRA_CHECK: "1"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        optional-pip: ""

    - name: Run E2E runtime tests
      run: |
        pytest tests/integration/test_runtime_e2e.py -v -m e2e --timeout=180
      timeout-minutes: 10

    - name: Start server for DSL tests
      run: |
        cd examples/simple_task
        python -m dazzle serve --test-mode --local --port 3000 > /tmp/dazzle-server.log 2>&1 &
        SERVER_PID=$!
        echo "Server PID: $SERVER_PID"
        for i in {1..45}; do
          if curl -s http://localhost:3000/health > /dev/null 2>&1; then
            echo "Server is ready"
            break
          fi
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server process died. Logs:"
            cat /tmp/dazzle-server.log
            exit 1
          fi
          echo "Waiting for server... ($i/45)"
          sleep 2
        done
        curl -f http://localhost:3000/health || { echo "Health check failed. Logs:"; cat /tmp/dazzle-server.log; exit 1; }
      timeout-minutes: 3

    - name: Run DSL tests
      run: |
        cd examples/simple_task
        python -m dazzle test run --no-auto-server --verbose
      timeout-minutes: 5
      continue-on-error: true  # Advisory until DOM contract is aligned

    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: e2e-runtime-failure
        path: |
          examples/simple_task/testspec.json
          examples/simple_task/test-results/
          /tmp/dazzle-server.log
        retention-days: 7

    - name: Cleanup
      if: always()
      run: |
        pkill -f "dazzle serve" || true

  # INTERACTION_WALK harness — scripted browser gestures against the
  # workspace dashboard (support_tickets). Gates on drag / Add-Card /
  # remove-button-reachable regressions that the static shape + HTMX
  # gates can't see.
  #
  # Ratcheted to BLOCKING in v0.57.66 — the harness caught two real
  # regressions during its signal-gathering window (#797 drag $el
  # scope bug, #798 addCard x-for DOM-insertion race), both fixed
  # cleanly. All three walks green across 3 CI retries in v0.57.65.
  # If flakes appear post-ratchet, re-add `continue-on-error: true`
  # here and file a tracking issue rather than quietly tolerating red.
  # The shell retry loop in the "Run INTERACTION_WALK" step still
  # gives each walk 3 attempts for transient infra races (server
  # boot, db provisioning) — only a genuinely-red walk after 3 tries
  # breaks the build.
  interaction-walks:
    name: INTERACTION_WALK (workspace gestures)
    runs-on: ubuntu-latest
    needs: [python-tests, lint]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dazzle
          POSTGRES_PASSWORD: dazzle_test
          POSTGRES_DB: dazzle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dazzle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
      DAZZLE_SKIP_INFRA_CHECK: "1"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        optional-pip: ""

    - name: Install playwright (E2E harness)
      shell: bash
      # playwright is not in any extras (yet — see #800 step 7 / open
      # follow-up to add an `e2e` extra). Install it separately here.
      # Pin at least 1.40 for the sync API shape we use in
      # dazzle/cli/ux_interactions.py.
      run: |
        uv pip install "playwright>=1.40"
        # Capture the resolved playwright version so the cache key
        # invalidates whenever the wheel pin moves. Coming from a
        # python package metadata read, not external user input.
        # playwright 1.59+ dropped the `__version__` module attribute; read
        # the package metadata directly so the cache-key probe survives
        # version-pin bumps. importlib.metadata.version is stdlib since 3.8.
        PLAYWRIGHT_VERSION=$(python -c "from importlib.metadata import version; print(version('playwright'))")
        echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"

    # Cache the chromium browser binary (~150MB) keyed on the resolved
    # playwright version. CDN downloads were the dominant flake class
    # on this job — v0.67.124 timed out the 5-min install on an
    # otherwise green build. On cache hit we still re-run install-deps
    # (apt-get OS packages are fresh on every runner) but skip the
    # network pull.
    - name: Cache Playwright chromium browser
      id: playwright-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright chromium (with OS deps)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        python -m playwright install --with-deps chromium
      timeout-minutes: 5

    - name: Install Playwright OS deps (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: |
        python -m playwright install-deps chromium
      timeout-minutes: 2

    - name: Run INTERACTION_WALK (with retry)
      # Per design-doc step 4: retry up to 2 times on regression to
      # absorb Playwright-over-HTMX flake during the non-blocking
      # window. Exit 2 (setup failure) retries the same way so a
      # transient server boot issue doesn't create a false signal.
      #
      # --persona agent: support_tickets's agent persona lands on
      # the ticket_queue workspace, which is populated by default
      # with cards (the catalog + initial layout the harness needs).
      # Without auth, /app redirects to login and the harness sees
      # no cards.
      run: |
        cd examples/support_tickets
        set +e
        for attempt in 1 2 3; do
          echo "=== Attempt $attempt / 3 ==="
          python -m dazzle ux verify --interactions --headless --persona agent
          rc=$?
          echo "rc=$rc"
          if [ $rc -eq 0 ]; then exit 0; fi
          if [ $attempt -lt 3 ]; then
            echo "Retrying in 5s..."
            sleep 5
          fi
        done
        exit $rc
      timeout-minutes: 8

    # #1295 — orthogonal geometry/viewport dimension, run LIVE in CI as a
    # BLOCKING gate (promoted from advisory once the harness was proven —
    # v0.80.42 self-auth + RBAC-skip, v0.80.43 exit-non-zero, v0.80.44 pattern
    # set all-green; the v0.80.44 advisory run was 23 passed / 0 failed / 17
    # skipped against an authenticated support_tickets render). The runner
    # authenticates as --persona agent, asserts the app-shell sidebar is
    # on-screen at desktop (transform ≈ identity) + the toggle is visible (the
    # dimension that missed #1294 — markup present, off-screen) + region grid
    # column counts, and skips persona-unreachable pages. `run-viewport` exits
    # non-zero on any real failure (#1295), so this step now gates main.
    # If flakes appear, re-add `continue-on-error: true` and reopen #1295.
    # Reuses this job's Playwright + postgres setup.
    - name: Run viewport assertions (orthogonal geometry gate, #1295)
      run: |
        cd examples/support_tickets
        python -m dazzle serve --test-mode --local --port 3000 > /tmp/viewport-server.log 2>&1 &
        for i in $(seq 1 30); do
          if curl -fsS -o /dev/null "http://localhost:3000/health" 2>/dev/null; then
            echo "server ready after ${i}s"; break
          fi
          sleep 1
        done
        rc=0
        DAZZLE_SITE_URL="http://localhost:3000" DAZZLE_API_URL="http://localhost:3000" \
          python -m dazzle e2e run-viewport --viewports mobile,desktop --persona agent --json || rc=$?
        pkill -f "dazzle serve" || true
        exit $rc
      timeout-minutes: 6

    - name: Cleanup
      if: always()
      run: |
        pkill -f "dazzle serve" || true

  # GUIDE_WALK oracle (example-guides Phase 3): for each example app, boot it,
  # authenticate as each onboarding guide's audience persona, and assert the
  # <dz-onboarding-step> overlay actually renders on the first step's surface —
  # the runtime proof that the persona is shown the guide the DSL promises.
  # No Playwright (server-rendered HTML, sync httpx). Matrixed over all 11
  # examples so each gets a clean Postgres + its own boot.
  #
  # BLOCKING. The v0.82.57 promotion was reverted in v0.82.58 after ONE green
  # run when the next failed on the invoice_ops cell. Root cause (#1395, fixed
  # v0.82.64): not a flake — the invoice_ops auditor guide targeted a *shadowed*
  # secondary list surface (audit_export) that the runtime never renders (every
  # list surface of an entity collapses to /app/<entity>); re-targeted to the
  # default surface. Re-promoted to blocking after 7 consecutive runs with all
  # 11 example cells green (the "a few runs, not one" lesson — #1395).
  guide-walks:
    name: GUIDE_WALK (onboarding overlays)
    runs-on: ubuntu-latest
    needs: [python-tests, lint]
    strategy:
      fail-fast: false
      matrix:
        app:
          - simple_task
          - contact_manager
          - support_tickets
          - ops_dashboard
          - fieldtest_hub
          - project_tracker
          - design_studio
          - llm_ticket_classifier
          - acme_billing
          - hr_records
          - invoice_ops
          - domain_join_co

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dazzle
          POSTGRES_PASSWORD: dazzle_test
          POSTGRES_DB: dazzle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dazzle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
      DAZZLE_SKIP_INFRA_CHECK: "1"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        optional-pip: ""

    - name: Run GUIDE_WALK (with retry)
      # BLOCKING (#1395) — re-promoted after 7 consecutive all-green runs.
      # If flakes appear post-ratchet, re-add `continue-on-error: true` and reopen #1395.
      run: |
        cd examples/${{ matrix.app }}
        set +e
        for attempt in 1 2 3; do
          echo "=== Attempt $attempt / 3 (app=${{ matrix.app }}) ==="
          python -m dazzle ux verify --guides
          rc=$?
          echo "rc=$rc"
          if [ $rc -eq 0 ]; then exit 0; fi
          if [ $attempt -lt 3 ]; then
            echo "Retrying in 5s..."
            sleep 5
          fi
        done
        exit $rc
      timeout-minutes: 8

    - name: Cleanup
      if: always()
      run: |
        pkill -f "dazzle serve" || true

  # ux verify --contracts --managed — structural assertion that every
  # framework-generated contract against the canonical example app
  # (support_tickets) still passes after a given change. This is the
  # Layer 3 gate discussed in the v0.57.69 post-mortem: proven gates
  # get promoted to blocking CI rather than left discretionary.
  #
  # Baseline as of v0.57.69: 34 passed, 0 failed, 30 pending.
  # The job asserts "failed == 0" — the pending count varies with
  # seed-data availability and is not part of the contract signal.
  # If any real regression is introduced (bad persona, missing region,
  # broken workspace access rule) the failed count becomes non-zero
  # and CI goes red.
  contracts-gate:
    name: UX Contracts (support_tickets)
    runs-on: ubuntu-latest
    needs: [python-tests, lint]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dazzle
          POSTGRES_PASSWORD: dazzle_test
          POSTGRES_DB: dazzle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dazzle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
      DAZZLE_SKIP_INFRA_CHECK: "1"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        optional-pip: ""

    - name: Run contracts check (managed server)
      run: |
        cd examples/support_tickets
        set +e
        out=$(python -m dazzle ux verify --contracts --managed 2>&1)
        rc=$?
        echo "$out"
        # Extract the "Contracts: X passed, Y failed, Z pending" line
        # and assert Y == 0. Pending is allowed (varies with seed data).
        failed=$(echo "$out" | grep -oE "[0-9]+ failed" | head -1 | grep -oE "[0-9]+")
        if [ -z "$failed" ]; then
          echo "::error::Could not parse contracts summary from output"
          exit 2
        fi
        if [ "$failed" -ne 0 ]; then
          echo "::error::Contracts gate failed: $failed failures (expected 0)"
          exit 1
        fi
        echo "Contracts gate: $failed failures — OK"
        exit 0
      timeout-minutes: 5

    - name: Cleanup
      if: always()
      run: |
        pkill -f "dazzle serve" || true

  # Homebrew formula validation - ensures formula is syntactically correct
  # and version numbers are consistent across all files
  homebrew-validation:
    name: Homebrew Formula Validation
    runs-on: macos-14  # Need macOS for brew commands

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Extract expected version
      id: version
      run: |
        # Get version from pyproject.toml (source of truth)
        VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "Expected version: ${VERSION}"

    - name: Validate formula syntax
      run: |
        # Check Ruby syntax
        ruby -c homebrew/dazzle.rb || { echo "ERROR: Formula has Ruby syntax errors"; exit 1; }
        echo "✓ Formula syntax is valid"

    - name: Check version consistency
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"

        # Check formula version (skip PLACEHOLDER check - handled at release time)
        FORMULA_VERSION=$(grep 'version "' homebrew/dazzle.rb | head -1 | cut -d'"' -f2)

        # Formula may have PLACEHOLDER_VERSION before release
        if [[ "${FORMULA_VERSION}" == "PLACEHOLDER_VERSION" ]]; then
          echo "Note: Formula has placeholder version (will be updated at release time)"
        elif [[ "${FORMULA_VERSION}" != "${VERSION}" ]]; then
          echo "WARNING: Formula version (${FORMULA_VERSION}) differs from pyproject.toml (${VERSION})"
          echo "This may be expected if preparing a release"
        else
          echo "✓ Formula version matches pyproject.toml: ${VERSION}"
        fi

        echo "✓ Version consistency check passed"

    - name: Validate formula structure
      run: |
        # Ensure required sections exist
        echo "Checking required formula sections..."

        grep -q 'class Dazzle < Formula' homebrew/dazzle.rb || { echo "ERROR: Missing Dazzle class"; exit 1; }
        grep -q 'desc "' homebrew/dazzle.rb || { echo "ERROR: Missing description"; exit 1; }
        grep -q 'homepage "' homebrew/dazzle.rb || { echo "ERROR: Missing homepage"; exit 1; }
        grep -q 'def install' homebrew/dazzle.rb || { echo "ERROR: Missing install method"; exit 1; }
        grep -q 'test do' homebrew/dazzle.rb || { echo "ERROR: Missing test block"; exit 1; }
        grep -q 'resource "pydantic-core"' homebrew/dazzle.rb || { echo "ERROR: Missing pydantic-core resource"; exit 1; }

        echo "✓ All required formula sections present"

    - name: Check for common issues
      run: |
        # Check for unexpanded shell variables (shouldn't happen in template)
        if grep -E '\$\{[A-Z_]+\}' homebrew/dazzle.rb | grep -v 'PLACEHOLDER'; then
          echo "WARNING: Found unexpanded shell variables"
        fi

        # Check for hardcoded paths that should be variables
        if grep -E '/usr/local|/opt/homebrew' homebrew/dazzle.rb; then
          echo "WARNING: Found hardcoded paths - use Homebrew variables instead"
        fi

        # Ensure Python version dependency is reasonable
        PYTHON_DEP=$(grep 'depends_on "python@' homebrew/dazzle.rb | head -1)
        echo "Python dependency: ${PYTHON_DEP}"

        echo "✓ Formula passed common issue checks"

    - name: Validate PyPI wheel URLs
      run: |
        echo "Checking PyPI wheel URLs in formula..."

        # Extract and validate all PyPI URLs (skip PLACEHOLDERs)
        URLS=$(grep -oE 'https://files.pythonhosted.org/[^"]+\.whl' homebrew/dazzle.rb || true)

        if [ -z "$URLS" ]; then
          echo "Note: No PyPI wheel URLs found (may be using placeholders)"
          exit 0
        fi

        FAILED=0
        for url in $URLS; do
          echo -n "  Checking $url... "
          if curl -sIf "$url" > /dev/null 2>&1; then
            echo "✓"
          else
            echo "✗ INVALID"
            FAILED=1
          fi
        done

        if [ $FAILED -eq 1 ]; then
          echo "ERROR: One or more PyPI wheel URLs are invalid!"
          exit 1
        fi

        echo "✓ All PyPI wheel URLs are valid"
