name: docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue Pages deployments, don't cancel: cancelling a deploy mid-flight can
# leave the Pages pipeline in a state that fails the next attempt with
# "Deployment failed, try again later" (GitHub's recommended setting for
# deployment concurrency — matches packages/hatchi-maxchi/.github/workflows/pages.yml).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-docs.txt ]; then pip install -r requirements-docs.txt; else pip install .[docs]; fi

      - name: Generate API reference docs
        run: python scripts/gen_reference_docs.py

      # The UX catalogue page is committed; its freshness is gated by
      # tests/unit/test_ux_catalogue.py in the main CI (which has the framework
      # installed). This docs job is mkdocs-only — it just builds the committed
      # page, so it must NOT import the framework here.

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: site

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
