# Regenerate packages/hatchi-maxchi/tests/baselines/linux/ on ubuntu
# (same Chromium font stack as HM standalone visual CI) and commit.
name: HM update visual baselines

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install pytest playwright pillow
          playwright install --with-deps chromium
      - name: Capture linux baselines
        working-directory: packages/hatchi-maxchi
        env:
          HM_UPDATE_BASELINES: "1"
        # Isolate from monorepo pytest.ini (asyncio_default_fixture_loop_scope).
        run: >
          python -m pytest tests/test_visual.py -q
          -c /dev/null
          --rootdir=.
          -p no:cacheprovider
      # Main is PR-protected; bot push is rejected. Upload for local commit/push.
      - uses: actions/upload-artifact@v7
        with:
          name: linux-baselines
          path: packages/hatchi-maxchi/tests/baselines/linux/
