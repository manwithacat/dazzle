name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed for dist rebuild push

jobs:
  rebuild-dist:
    name: Rebuild dist bundles for CDN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Rebuild dist
        run: python scripts/build_dist.py

      - name: Commit dist if changed
        continue-on-error: true
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: rebuild dist bundles for $(git describe --tags --always)"
          git push origin HEAD:refs/heads/main

  build:
    name: Build sdist and wheel
    needs: rebuild-dist
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      # v0.62 (Phase 4 teardown): the Tailwind compile-and-package
      # pipeline was removed. Every Dazzle UI template now consumes
      # semantic .dz-* class families served by checked-in static CSS
      # files — no JIT step needed before the wheel build, no editable
      # install needed for a CLI that no longer exists.

      - name: Build package
        run: python -m build --outdir py_dist/

      - name: Check package
        run: twine check py_dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist
          path: py_dist/

  test-install:
    name: Smoke-test the built wheel
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          sparse-checkout: examples/simple_task
          sparse-checkout-cone-mode: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: |
          python -m pip install dist/dazzle_dsl-*.whl

      - name: Verify console script
        run: dazzle --help

      - name: Verify import
        run: python -c "from dazzle.core import ir; print('IR import OK')"

      - name: Verify DSL validation
        run: |
          cd examples/simple_task
          dazzle validate

  publish:
    name: Publish to PyPI
    needs: [build, test-install]
    runs-on: ubuntu-latest
    # Publish minor/major releases only (patch component == 0). Every push is
    # still tagged for traceability, but PyPI receives only vX.Y.0 — patches
    # (vX.Y.1+) are not published. `endsWith('.0')` is exact: multi-digit patches
    # like v1.2.10 / v1.2.20 end in "10"/"20", never ".0". workflow_dispatch
    # (manual release with an explicit version input) is always allowed through.
    if: github.event_name == 'workflow_dispatch' || endsWith(github.ref, '.0')
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
