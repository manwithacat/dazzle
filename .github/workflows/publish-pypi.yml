name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed for dist rebuild push

jobs:
  rebuild-dist:
    name: Rebuild dist bundles for CDN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Rebuild dist
        run: python scripts/build_dist.py

      - name: Commit dist if changed
        continue-on-error: true
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: rebuild dist bundles for $(git describe --tags --always)"
          git push origin HEAD:refs/heads/main

  build:
    name: Build sdist and wheel
    needs: rebuild-dist
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build --outdir py_dist/

      - name: Check package
        run: twine check py_dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: py_dist/

  test-install:
    name: Smoke-test the built wheel
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: examples/simple_task
          sparse-checkout-cone-mode: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: |
          python -m pip install dist/dazzle_dsl-*.whl

      - name: Verify console script
        run: dazzle --help

      - name: Verify import
        run: python -c "from dazzle.core import ir; print('IR import OK')"

      - name: Verify DSL validation
        run: |
          cd examples/simple_task
          dazzle validate

  publish:
    name: Publish to PyPI
    needs: [build, test-install]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
