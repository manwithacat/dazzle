name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed for dist rebuild push

jobs:
  rebuild-dist:
    name: Rebuild dist bundles for CDN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Rebuild dist
        run: python scripts/build_dist.py

      - name: Commit dist if changed
        continue-on-error: true
        run: |
          if git diff --quiet dist/; then
            echo "dist/ is up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: rebuild dist bundles for $(git describe --tags --always)"
          git push origin HEAD:refs/heads/main

  build:
    name: Build sdist and wheel
    needs: rebuild-dist
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Install dazzle-dsl (for build_css CLI)
        # Editable install so the `dazzle` console script is available on
        # PATH for the build-css step. Minimal install — no extras needed.
        run: python -m pip install -e .

      - name: Rebuild Tailwind CSS bundle (#843)
        # dazzle-bundle.css is gitignored (.gitignore:45). Without this
        # step the wheel ships whatever stale bundle the runner happens to
        # have — i.e. nothing on a clean checkout — so new Tailwind classes
        # added in template refactors don't appear on downstream installs.
        # Run build_css against the committed templates so the wheel is
        # always consistent with the tagged commit.
        run: dazzle build-css --output src/dazzle_ui/runtime/static/css/dazzle-bundle.css

      - name: Build package
        run: python -m build --outdir py_dist/

      - name: Verify bundle shipped in wheel
        # Catch regressions where build-css succeeds but the wheel omits
        # the bundle (pyproject.toml package_data drift).
        run: |
          python -m zipfile -l py_dist/dazzle_dsl-*.whl | grep -E 'dazzle_ui/runtime/static/css/dazzle-bundle\.css' || {
            echo "::error::dazzle-bundle.css missing from wheel — #843 regression";
            exit 1;
          }

      - name: Check package
        run: twine check py_dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: py_dist/

  test-install:
    name: Smoke-test the built wheel
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: examples/simple_task
          sparse-checkout-cone-mode: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: |
          python -m pip install dist/dazzle_dsl-*.whl

      - name: Verify console script
        run: dazzle --help

      - name: Verify import
        run: python -c "from dazzle.core import ir; print('IR import OK')"

      - name: Verify DSL validation
        run: |
          cd examples/simple_task
          dazzle validate

  publish:
    name: Publish to PyPI
    needs: [build, test-install]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
