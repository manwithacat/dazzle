name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel an in-flight review when a new commit arrives on the same PR —
# the latest commit's review supersedes any earlier one.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip on Dependabot PRs. GitHub deliberately scopes secrets down for
    # Dependabot-authored workflow runs, so CLAUDE_CODE_OAUTH_TOKEN /
    # ANTHROPIC_API_KEY arrive empty and the action exits with an
    # "Internal error: directory mismatch" log line. The fix isn't to
    # leak secrets to Dependabot — it's to skip the review for it.
    # Dependabot PRs are small mechanical bumps; Dependabot's own
    # changelog summary in the PR body is the right review surface.
    if: github.event.pull_request.user.login != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
