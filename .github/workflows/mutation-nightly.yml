name: Nightly Mutation Gate

# Mutation testing measures test STRENGTH (does a test fail when the code is subtly
# broken?), the complement to coverage and fuzzing. `dazzle sentinel mutate --suite
# security` mutates the security-critical modules and fails if any falls below its
# registered kill-rate floor (src/dazzle/testing/mutation/targets.py). A floor breach means
# a regression in test strength — a place a future bug could slip past CI silently.
#
# Nightly (not per-PR) because a full sweep with the Postgres enforcement suite takes ~10
# min. DATABASE_URL is set so the SQL-generation modules (rls_schema, predicate_compiler)
# are measured against their PG enforcement tests — unit tests alone understate them ~5-8×.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily (after fuzz-nightly at 05:00)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation-gate:
    name: Mutation Gate (security modules)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dazzle
          POSTGRES_PASSWORD: dazzle_test
          POSTGRES_DB: dazzle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dazzle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - uses: ./.github/actions/setup-dazzle
      with:
        extras: dev,llm,mcp,postgres,saml,sso

    - name: Build asset bundles
      run: python scripts/build_dist.py

    - name: Run mutation gate (security suite)
      env:
        DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
        TEST_DATABASE_URL: postgresql://dazzle:dazzle_test@localhost:5432/dazzle_test
      run: |
        dazzle sentinel mutate --suite security

  # Nightlies are schedule-only — they never gate a commit, so a failure would
  # otherwise rot invisibly in the Actions tab. This job makes a failure feed
  # back as a visible, actionable tracking issue (open once, comment thereafter).
  notify-on-failure:
    name: Notify on failure (open/update tracking issue)
    needs: mutation-gate
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update the nightly-failure tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="Nightly CI failing: mutation-nightly"
          gh label create ci-nightly --color FBCA04 --description "Nightly CI failure" 2>/dev/null || true
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number,title \
                  --jq "map(select(.title==\"$TITLE\")) | .[0].number // empty")
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "Still failing — $RUN_URL"
          else
            printf '%s\n\n%s\n\n%s\n' \
              "The **mutation-nightly** workflow failed (schedule-only — it does not gate commits)." \
              "Latest run: $RUN_URL" \
              "Automated by the nightly failure-feedback job. Close once the nightly is green again; it re-opens on the next failure." \
              | gh issue create --title "$TITLE" --label ci-nightly --body-file -
          fi
