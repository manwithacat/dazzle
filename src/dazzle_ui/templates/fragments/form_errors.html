{# Form-level validation errors (swapped by HTMX) — UX-016 form-chrome #}
{% if form_errors %}
<div class="flex gap-3 p-3 mb-4 rounded-[4px] border border-[hsl(var(--destructive))] bg-[hsl(var(--destructive)/0.08)]"
     role="alert" aria-live="assertive" data-dazzle-error>
  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-[hsl(var(--destructive))]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
  </svg>
  <div class="min-w-0">
    <h3 class="text-[13px] font-semibold text-[hsl(var(--foreground))]">Validation Error</h3>
    {% if form_errors is string %}
    <p class="text-[13px] text-[hsl(var(--foreground))] mt-0.5">{{ form_errors }}</p>
    {% else %}
    <ul class="list-disc list-inside text-[13px] text-[hsl(var(--foreground))] mt-0.5 space-y-0.5" role="list">
      {% for err in form_errors %}
      <li>{{ err }}</li>
      {% endfor %}
    </ul>
    {% endif %}
  </div>
</div>
{% endif %}
