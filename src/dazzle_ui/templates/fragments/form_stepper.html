{# Form stepper — visual progress indicator for multi-section forms #}
{# Renders a DaisyUI steps component with stage navigation #}
{# Requires: form.sections (list of FormSectionContext), parent dzWizard x-data #}

<div class="mb-6">
  <ul class="steps steps-horizontal w-full">
    {% for section in form.sections %}
    <li class="step" :class="isActive({{ loop.index0 }}) && 'step-primary'"
        @click="goToStep({{ loop.index0 }})" style="cursor: pointer">
      <span class="text-sm">{{ section.title }}</span>
    </li>
    {% endfor %}
  </ul>
</div>
