<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Viewer Quality Gate Test Harness</title>

    <!-- Cycle 1b chrome under test. The bundled CSS resolves all
         tokens used by pdf-viewer.css; we pull both directly so the
         harness exercises the same cascade as a real Dazzle page. -->
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/components/pdf-viewer.css" />

    <!-- Bridge first (so registerWidget exists), then pdf-viewer.js. -->
    <script defer src="/js/dz-component-bridge.js"></script>
    <script defer src="/js/pdf-viewer.js"></script>

    <style>
      /* Mirror production reset — base.css zeros body margins, so
         the harness must too or the chrome's `height: 100vh`
         overflows the viewport by 8px (default body margin) and
         the gates catch a phantom overflow. */
      body {
        margin: 0;
        padding: 0;
      }

      /* Status overlay for human inspection — Playwright tests
         interact with elements above the body, this just shows
         what's happening when a developer opens the harness in
         a real browser. */
      #harness-status {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #111;
        color: #4cb782;
        padding: 8px 16px;
        font: 13px monospace;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <!--
      This harness has THREE configurable variants the Playwright
      tests select via `?variant=`:

        - both     — both prev_url and next_url set (default)
        - prev     — only prev_url set; next disabled
        - next     — only next_url set; prev disabled
        - none     — neither set; sibling-nav block omitted

      All three use hash URLs so keyboard shortcuts produce hash
      changes the test can read off `page.url` without a real
      navigation.
    -->

    <div
      id="pdf-viewer-host"
      class="dz-pdf-viewer"
      data-dz-widget="pdf-viewer"
      data-dz-back-url="#back"
      data-dz-prev-url="#prev"
      data-dz-next-url="#next"
    >
      <header class="dz-pdf-viewer-header">
        <a href="#back" class="dz-pdf-viewer-back" aria-label="Back">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="m12 19-7-7 7-7"></path>
            <path d="M19 12H5"></path>
          </svg>
          <span class="dz-pdf-viewer-back-label">Back</span>
        </a>
        <h1 class="dz-pdf-viewer-title" id="harness-title">
          Test Document
        </h1>
        <nav class="dz-pdf-viewer-nav" aria-label="Sibling navigation">
          <a
            href="#prev"
            class="dz-pdf-viewer-nav-link"
            id="harness-prev"
            aria-label="Previous"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </a>
          <a
            href="#next"
            class="dz-pdf-viewer-nav-link"
            id="harness-next"
            aria-label="Next"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="m9 18 6-6-6-6"></path>
            </svg>
          </a>
        </nav>
      </header>

      <div class="dz-pdf-viewer-body" id="harness-body">
        <!--
          Default: a flat colour div stub (browser-independent, no
          PDF plugin invoked). Real component uses
          ``<embed type="application/pdf">``; ``?embed=1`` swaps in
          the real embed element so the gates exercise the
          production layout pathway. Chrome stability is verified
          by gates against the stub; embed-specific layout by gates
          against the real-embed variant.
        -->
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: center;
            inline-size: 100%;
            block-size: 100%;
            background: #d8d8d8;
            color: #555;
            font: 14px monospace;
          "
          id="harness-body-stub"
        >
          PDF body (test stub)
        </div>

        <!--
          Optional panel slot (#942 cycle 2a). Lives INSIDE
          .dz-pdf-viewer-body so position: absolute pins it to the
          body's bounds, not the wrapper's. Mirrors production
          template (components/pdf_viewer.html). Always rendered
          in the harness; production renders conditionally on the
          ``panel_html`` parameter.
        -->
        <input
          type="checkbox"
          id="dz-panel-toggle"
          class="dz-pdf-viewer-panel-toggle"
          aria-label="Toggle related panel"
        />
        <aside
          class="dz-pdf-viewer-panel"
          role="complementary"
          aria-label="Related"
          id="harness-panel"
        >
          <header class="dz-pdf-viewer-panel-header">
            <h2 class="dz-pdf-viewer-panel-title">Related</h2>
            <button
              type="button"
              class="dz-pdf-viewer-panel-close"
              data-dz-panel-close
              id="harness-panel-close"
              aria-label="Close panel"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </header>
          <div class="dz-pdf-viewer-panel-body" id="harness-panel-body">
            <!-- Default short content; ?long_panel=1 (handled by
                 the bootstrap below) replaces with a deliberately
                 tall block so cycle 2c gates can exercise overflow
                 scrolling. -->
            <p>Test panel content (harness)</p>
          </div>
        </aside>
      </div>

      <footer
        class="dz-pdf-viewer-footer"
        aria-label="Keyboard shortcuts"
      >
        <kbd class="dz-pdf-viewer-kbd">Esc</kbd>
        <span class="dz-pdf-viewer-kbd-label">Back</span>
        <span class="dz-pdf-viewer-kbd-sep">·</span>
        <kbd class="dz-pdf-viewer-kbd">j</kbd>
        <span class="dz-pdf-viewer-kbd-label">Previous</span>
        <kbd class="dz-pdf-viewer-kbd">k</kbd>
        <span class="dz-pdf-viewer-kbd-label">Next</span>
      </footer>
    </div>

    <!-- Hidden text input the editable-suppression gate uses to
         confirm typing 'j' / 'k' into a form field doesn't trigger
         sibling navigation. -->
    <input
      type="text"
      id="harness-text-input"
      style="position: fixed; top: 8px; right: 8px; z-index: 10000; opacity: 0.4;"
      placeholder="editable-suppression test"
    />

    <div id="harness-status">
      Harness ready · last hash:
      <span id="harness-last-hash">(none)</span>
    </div>

    <script>
      // ---------------------------------------------------------------
      // Variant + theme config — read once on load.
      // ---------------------------------------------------------------
      (function () {
        var params = new URLSearchParams(window.location.search);
        var variant = params.get("variant") || "both";
        var dark = params.get("dark") === "1";
        var useEmbed = params.get("embed") === "1";
        var longPanel = params.get("long_panel") === "1";

        // #942 cycle 2c: long-content variant for overflow gates.
        // Replaces the panel body's default short content with a
        // deliberately tall block so the gate can confirm the body
        // scrolls inside its own container, leaving the header
        // (and close button) pinned at the top.
        if (longPanel) {
          var panelBody = document.getElementById("harness-panel-body");
          if (panelBody) {
            var paragraphs = [];
            for (var i = 0; i < 80; i++) {
              paragraphs.push("<p>Long panel paragraph " + (i + 1) + "</p>");
            }
            // textContent on the wrapper, then per-paragraph append
            // — avoids any innerHTML pattern. Pure DOM construction.
            panelBody.textContent = "";
            for (var j = 0; j < 80; j++) {
              var p = document.createElement("p");
              p.textContent = "Long panel paragraph " + (j + 1);
              panelBody.appendChild(p);
            }
          }
        }

        // Real-embed variant: swap the harness's body stub for an
        // actual <embed type="application/pdf"> pointing at
        // about:blank. Browsers handle the empty source by showing
        // a blank plugin frame, but the LAYOUT BOX is still there
        // and respects the container's dimensions — that's what
        // the cycle 1h embed-layout gate verifies.
        if (useEmbed) {
          var stub = document.getElementById("harness-body-stub");
          if (stub) {
            var embed = document.createElement("embed");
            embed.setAttribute("type", "application/pdf");
            embed.setAttribute("src", "about:blank");
            embed.setAttribute("class", "dz-pdf-viewer-embed");
            embed.id = "harness-body-embed";
            stub.parentNode.replaceChild(embed, stub);
          }
        }

        // Dark-mode opt-in mirrors what the in-app shell does on
        // toggle (see app_shell.html applyDark): set both
        // data-theme and the colorScheme binding so light-dark()
        // flips. Same plumbing as #938.
        if (dark) {
          document.documentElement.setAttribute("data-theme", "dark");
        }

        var host = document.getElementById("pdf-viewer-host");
        var nav = host.querySelector(".dz-pdf-viewer-nav");
        var prev = document.getElementById("harness-prev");
        var next = document.getElementById("harness-next");

        if (variant === "prev") {
          host.removeAttribute("data-dz-next-url");
          next.setAttribute("aria-disabled", "true");
          next.setAttribute("tabindex", "-1");
          next.setAttribute("href", "#");
        } else if (variant === "next") {
          host.removeAttribute("data-dz-prev-url");
          prev.setAttribute("aria-disabled", "true");
          prev.setAttribute("tabindex", "-1");
          prev.setAttribute("href", "#");
        } else if (variant === "none") {
          host.removeAttribute("data-dz-prev-url");
          host.removeAttribute("data-dz-next-url");
          if (nav) nav.parentNode.removeChild(nav);
        }
      })();

      // ---------------------------------------------------------------
      // Hash mirror for human inspection.
      // ---------------------------------------------------------------
      function reflectHash() {
        document.getElementById("harness-last-hash").textContent =
          window.location.hash || "(none)";
      }
      window.addEventListener("hashchange", reflectHash);
      reflectHash();

      // ---------------------------------------------------------------
      // Quality-gate API — Playwright drives these from
      // tests/quality_gates/test_pdf_viewer_gates.py.
      // ---------------------------------------------------------------
      window.pdfViewerGates = {
        chromePresent: function () {
          return {
            host: !!document.getElementById("pdf-viewer-host"),
            header: !!document.querySelector(".dz-pdf-viewer-header"),
            body: !!document.querySelector(".dz-pdf-viewer-body"),
            footer: !!document.querySelector(".dz-pdf-viewer-footer"),
            back: !!document.querySelector(".dz-pdf-viewer-back"),
            title: !!document.querySelector(".dz-pdf-viewer-title"),
          };
        },

        chromeRectangles: function () {
          var pick = function (sel) {
            var el = document.querySelector(sel);
            if (!el) return null;
            var r = el.getBoundingClientRect();
            return {
              top: r.top,
              left: r.left,
              width: r.width,
              height: r.height,
              bottom: r.bottom,
              right: r.right,
            };
          };
          return {
            host: pick("#pdf-viewer-host"),
            header: pick(".dz-pdf-viewer-header"),
            body: pick(".dz-pdf-viewer-body"),
            footer: pick(".dz-pdf-viewer-footer"),
          };
        },

        widgetMounted: function () {
          // The bridge runs registerWidget at script load. We can't
          // introspect document keydown listeners directly, so this
          // confirms the bridge surface is present.
          var bridge = window.dz && window.dz.bridge;
          return {
            bridgePresent: !!bridge,
            registerWidgetIsFunction:
              !!(bridge && typeof bridge.registerWidget === "function"),
          };
        },

        // #942 cycle 1d — dark-mode parity. Reads the computed
        // background-color of every chrome band so the gates can
        // assert (a) every band has a non-empty resolved colour,
        // (b) the body bg actually differs from the chrome surfaces
        // (visual separation), (c) all values flip between light
        // and dark themes.
        chromeBackgrounds: function () {
          var read = function (sel) {
            var el = document.querySelector(sel);
            if (!el) return null;
            return getComputedStyle(el).backgroundColor;
          };
          return {
            host: read("#pdf-viewer-host"),
            header: read(".dz-pdf-viewer-header"),
            body: read(".dz-pdf-viewer-body"),
            footer: read(".dz-pdf-viewer-footer"),
            kbd: read(".dz-pdf-viewer-kbd"),
          };
        },
      };
    </script>
  </body>
</html>
