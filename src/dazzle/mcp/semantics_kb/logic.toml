[concepts.invariant]
category = "Business Logic (v0.7)"
doc_page = "entities"
doc_order = 9
definition = "Cross-field validation rules that must always hold. Enforced on create and update. Part of the declarative business logic layer."
syntax = '''
invariant: <condition>

# Operators:
# Comparison: =, !=, >, <, >=, <=
# Logical: and, or, not
# Null check: field != null, field = null

# IMPORTANT: Use single = for equality (not ==)
'''
example = '''
entity Booking "Booking":
  start_date: datetime required
  end_date: datetime required
  priority: enum[low,medium,high]=medium
  due_date: date

  # End must be after start
  invariant: end_date > start_date

  # High priority bookings must have a due date
  invariant: priority != high or due_date != null
'''
related = ["entity", "state_machine", "access_rules"]
v0_7_changes = "NEW in v0.7"
best_practices = ["Use = for equality (consistent with access rules)", "Express as 'A or B' for 'if A then B' rules", "Keep invariants simple and focused", "Document the business rule in a comment", "Invariants use comparison operators (>, <, =, !=) - state machines use 'requires field' instead"]

[concepts.state_machine]
category = "Business Logic (v0.7)"
doc_page = "entities"
doc_order = 10
definition = "Define allowed status/state transitions with optional guards. Prevents invalid state changes and documents workflow rules declaratively."
syntax = '''
transitions:
  <from_state> -> <to_state>
  <from_state> -> <to_state>: requires <field_name>
  <from_state> -> <to_state>: role(<role_name>)
  <from_state> -> <to_state>: auto after <N> days
  <from_state> -> <to_state>: auto after <N> hours OR manual
  * -> <to_state>: role(admin)  # wildcard: from any state

# Supported conditions:
#   requires <field_name>     - Field must not be null
#   role(<role_name>)         - User must have this role
#   auto after <N> days       - Auto-transition after delay
#   auto after <N> hours      - (also: minutes)
#   auto ... OR manual        - Allow manual trigger too

# NOT supported in transitions (use invariants instead):
#   field != null        - Use: requires field
#   field = value        - Not supported
#   field > value        - Not supported
#   Comparison operators - Not supported
'''
example = '''
entity Task "Task":
  status: enum[todo,in_progress,done,archived]=todo
  assigned_to: ref User

  transitions:
    todo -> in_progress: requires assigned_to
    in_progress -> done
    in_progress -> todo
    done -> todo: role(admin)  # Only admin can reopen
    done -> archived: auto after 30 days OR manual

entity Ticket "Ticket":
  status: enum[open,resolved,closed]=open
  resolution_note: text

  transitions:
    open -> resolved: requires resolution_note
    resolved -> closed: auto after 7 days OR manual
    resolved -> open
    * -> open: role(admin)  # Admin can reopen from any state
'''
related = ["entity", "invariant", "access_rules"]
v0_7_changes = "NEW in v0.7"
best_practices = ["Use for status fields with defined workflows", "Document transition rules that match business processes", "Use role guards for administrative overrides", "Use requires guards for data integrity", "Transition conditions are simpler than invariants - use 'requires field' not 'field != null'", "For complex validations (field > value, field = specific_value), use invariants with status conditions instead"]

[concepts.visibility_rules]
category = "Business Logic (v0.7)"
doc_page = "access-control"
doc_order = 3
definition = "Row-level visibility rules on entities. Controls which records are visible based on authentication state (anonymous or authenticated). Evaluated before permission rules to determine which records a user can see in list/query results. Uses ConditionExpr for the filter condition."
syntax = '''
visible:
  when anonymous: <condition>
  when authenticated: <condition>

# Auth contexts:
#   anonymous     - User is not logged in
#   authenticated - Any logged-in user

# Condition is a standard ConditionExpr:
#   field = value, field != value, role(name), field = current_user
#   Combine with: and, or
'''
example = '''
entity Document "Document":
  id: uuid pk
  title: str(200) required
  is_public: bool = false
  created_by: ref User

  visible:
    when anonymous: is_public = true
    when authenticated: is_public = true or created_by = current_user

entity Post "Blog Post":
  id: uuid pk
  published: bool = false
  author: ref User required

  visible:
    when anonymous: published = true
    when authenticated: published = true or author = current_user
'''
related = ["access_rules", "entity", "persona", "surface_access"]
best_practices = ["Use anonymous visibility for public-facing content", "Authenticated visibility should include the owner check (created_by = current_user)", "Combine with permission rules for full access control", "Visibility filters apply at query time - no data leaks in list views"]

[concepts.surface_access]
category = "Business Logic"
doc_page = "access-control"
doc_order = 5
definition = "Access control on surfaces (UI screens). Controls who can view and interact with a surface. Three levels: public (no auth), authenticated (any logged-in user), or persona-restricted (named personas only). Used by E2E test generators to create protected-route tests."
syntax = '''
surface <name> "<Title>":
  ...
  access: public
  access: authenticated
  access: persona(<name1>, <name2>, ...)

# access: public          → require_auth=false, anyone can access
# access: authenticated   → require_auth=true, any logged-in user
# access: persona(Admin, Manager) → require_auth=true, only listed personas
'''
example = '''
# Public surface - no login required
surface landing_page "Welcome":
  uses entity Page
  mode: view
  access: public

# Authenticated - any logged-in user
surface my_tasks "My Tasks":
  uses entity Task
  mode: list
  access: authenticated

# Persona-restricted - only these roles
surface admin_panel "Admin Panel":
  uses entity User
  mode: list
  access: persona(Admin, SuperAdmin)
'''
related = ["access_rules", "surface", "persona", "workspace_access", "visibility_rules"]
best_practices = ["Default to authenticated when auth is enabled globally", "Use persona() for admin-only or role-specific screens", "Public surfaces should only show non-sensitive data", "Pair with entity-level access rules for defense in depth"]

[concepts.workspace_access]
category = "Business Logic"
doc_page = "access-control"
doc_order = 6
definition = "Access control on workspaces. Defines who can access a workspace dashboard. Three levels: public, authenticated, or persona-restricted. Default is authenticated when auth is enabled globally. Syntax is the same as surface access."
syntax = '''
workspace <name> "<Title>":
  ...
  access: public
  access: authenticated
  access: persona(<name1>, <name2>, ...)

# access: public          → level=public, no login required
# access: authenticated   → level=authenticated, any logged-in user (default)
# access: persona(Admin)  → level=persona, only listed personas can access
'''
example = '''
# Public dashboard - visible without login
workspace public_metrics "Public Metrics":
  purpose: "Public-facing KPI dashboard"
  access: public

  metrics:
    aggregate:
      total_users: count(User)
    display: metrics

# Admin-only workspace
workspace admin_dashboard "Admin Dashboard":
  purpose: "System administration"
  access: persona(Admin, SuperAdmin)

  users:
    source: User
    display: list
    action: user_edit

# Default: authenticated (explicit for clarity)
workspace team_board "Team Board":
  purpose: "Team task overview"
  access: authenticated

  tasks:
    source: Task
    filter: status != closed
    sort: priority desc
    display: list
'''
