# =============================================================================
# Request Lifecycle
# =============================================================================

[concepts.request_lifecycle]
category = "Runtime Contract"
definition = """
The complete call chain for key request types. This is the path agents
trace manually via grep during debugging — having it indexed saves time.
"""
runtime_behaviour = """
POST /{entity}s (create):
  → CSRFMiddleware.__call__  (validates X-CSRF-Token)
  → AuthMiddleware           (extracts session → AuthContext)
  → _create_auth_handler     (FastAPI route handler)
    → Cedar permit check     (_extract_cedar_row_filters)
    → service.execute(operation="create", data=...)
      → repository.create(data)
        → QueryBuilder.build_insert()
        → db.execute(sql, params)

GET /{entity}s (list):
  → CSRFMiddleware.__call__  (safe method — pass through)
  → AuthMiddleware           (extracts session → AuthContext)
  → _list_handler_body
    → Cedar permit check     (entity-level gate)
    → build_visibility_filter (access_spec → sql_filters)
    → _resolve_scope_filters  (scope rules → row filters)
    → service.execute(operation="list", filters=..., search=...)
      → repository.list(page, page_size, filters, sort, search)
        → QueryBuilder.build_select()

GET /{entity}s/{id} (detail):
  → CSRFMiddleware → AuthMiddleware → _read_auth_handler
    → Cedar permit check
    → service.execute(operation="read", id=...)
      → repository.get(id)
      → relation_loader.expand_relations(item)
        → _resolve_display_name()

Workspace region render:
  → page_routes.workspace_handler
    → _render_workspace_regions
      → _apply_workspace_scope_filters (scope enforcement)
      → _fetch_region_data (repository.list with filters)
      → template.render(region_context)
"""
implemented_by = [
    "dazzle_back.runtime.csrf.CSRFMiddleware",
    "dazzle_back.runtime.route_generator.create_list_handler",
    "dazzle_back.runtime.route_generator._list_handler_body",
    "dazzle_back.runtime.route_generator.create_detail_handler",
    "dazzle_back.runtime.route_generator.create_create_handler",
    "dazzle_back.runtime.service_generator.CRUDService.execute",
    "dazzle_back.runtime.repository.DazzleRepository.list",
    "dazzle_back.runtime.relation_loader.expand_relations",
    "dazzle_ui.runtime.page_routes.workspace_handler",
]

# =============================================================================
# Middleware Execution Order
# =============================================================================

[concepts.middleware_order]
category = "Runtime Contract"
definition = """
The order in which middleware executes on each request. Important for
understanding why a request gets a 403 before reaching the route handler.
"""
runtime_behaviour = """
Middleware executes in LIFO order (last added = first to run):

1. CSRFMiddleware (outermost — runs first)
   → Validates CSRF token on mutations
   → Sets dazzle_csrf cookie on responses

2. CORSMiddleware (if configured)
   → Handles preflight OPTIONS requests

3. TenantMiddleware (if multi-tenant)
   → Resolves tenant from subdomain/header/session
   → Sets search_path on PostgreSQL connection

4. FastAPI routing (innermost)
   → Matches path to handler
   → Runs dependency injection (auth, etc.)
   → Calls route handler

Key implication: CSRF validation happens BEFORE auth, BEFORE routing.
A missing CSRF token returns 403 before the auth layer even checks
whether the user is logged in.
"""
implemented_by = [
    "dazzle_back.runtime.server.DazzleBackendApp._setup_security",
    "dazzle_back.runtime.csrf.apply_csrf_protection",
]

# =============================================================================
# Predicate Compilation Chain
# =============================================================================

[concepts.predicate_compilation]
category = "Runtime Contract"
since_version = "0.48.0"
definition = """
The multi-stage compilation chain that transforms DSL scope rules into
SQL WHERE clauses. Each stage can introduce fidelity loss.
"""
runtime_behaviour = """
Stage 1: Parse → ConditionExpr
  DSL text → parser → ConditionExpr tree (conditions.py)
  Comparison, ViaCondition, LogicalOperator nodes

Stage 2: ConditionExpr → ScopePredicate
  build_scope_predicate() in predicate_builder.py
  Maps to typed algebra: ColumnCheck, UserAttrCheck, PathCheck,
  ExistsCheck, BoolComposite, Tautology, Contradiction

  Key simplifications (BoolComposite.make()):
  - AND(x, Tautology) → x
  - OR(x, Tautology) → Tautology
  - NOT(NOT(x)) → x

Stage 3: ScopePredicate → (sql, params)
  compile_predicate() in predicate_compiler.py
  Produces a WHERE fragment with %s placeholders
  Marker objects: UserAttrRef(attr_name), CurrentUserRef()

Stage 4: Marker resolution (request time)
  Route handler substitutes markers with concrete values:
  UserAttrRef("school_id") → current_user.school_id
  CurrentUserRef() → current_user.id

Stage 5: SQL execution
  QueryBuilder.add_filters() applies the resolved SQL
"""
implemented_by = [
    "dazzle.core.ir.predicate_builder.build_scope_predicate",
    "dazzle.core.ir.predicates (ScopePredicate algebra types)",
    "dazzle_back.runtime.predicate_compiler.compile_predicate",
    "dazzle_back.runtime.predicate_compiler.UserAttrRef",
    "dazzle_back.runtime.predicate_compiler.CurrentUserRef",
    "dazzle_back.runtime.route_generator._resolve_predicate_filters",
]

