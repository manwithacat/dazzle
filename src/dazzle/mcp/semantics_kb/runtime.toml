# Runtime Contracts
# Documents runtime behaviour, limitations, and implementation details
# for DSL constructs that have non-obvious runtime semantics.
#
# This file bridges the gap between "what DSL syntax to use" (covered by
# other KB files) and "what happens at runtime" (what AI agents actually
# need when debugging).

[meta]
category = "Runtime Contracts"
version = "0.45.0"

# =============================================================================
# FK Resolution & Display
# =============================================================================

[concepts.display_field]
category = "Runtime Contract"
definition = """
Controls how an entity appears when referenced as a FK from another entity.
When entity A has `ref B`, and B has `display_field: name`, then loading A
will resolve B's FK to show B's `name` instead of B's raw UUID.
"""
runtime_behaviour = """
- Resolved in `relation_loader.py` when entity is loaded as FK expansion
- Sets `__display__` key on the expanded dict
- The fallback chain for display name: __display__ → name → title → code → label → id
- display_field is resolved by `_resolve_display_name()` in relation_loader.py
"""
limitations = """
- DEPTH LIMIT: Only resolves one level deep. If display_field points to a FK
  field (e.g. `display_field: student` where student is `ref User`), the
  __display__ value is the raw UUID of that FK — not the cascaded display name.
- Workaround: Always use scalar fields (name, code, label, email) for
  display_field, never FK fields.
"""
implemented_by = [
    {fn = "dazzle_back.runtime.relation_loader._resolve_display_name", purpose = "resolves display_field to a scalar value via the fallback chain"},
    {fn = "dazzle_back.runtime.relation_loader.expand_relations", purpose = "expands FK references on query results, calling _resolve_display_name"},
]
known_issues = ["#590: FK display_field resolves to UUID at depth > 1"]
syntax = """
entity User "User":
  display_field: name    # ← scalar field, GOOD
  name: str(100) required

entity Task "Task":
  display_field: title   # ← scalar field, GOOD
  title: str(200) required
  assignee: ref User     # Will show User.name, not UUID
"""

# =============================================================================
# Scope Evaluation
# =============================================================================

[concepts.scope_runtime]
category = "Runtime Contract"
definition = """
How scope rules are evaluated at runtime to filter rows on API list endpoints
and workspace region queries. Scope rules compile from DSL through a multi-stage
pipeline: ConditionExpr → ScopePredicate → (sql, params) → resolved SQL.
"""
runtime_behaviour = """
- Entry point: `_resolve_scope_filters()` in route_generator.py
- Called from `_list_handler_body()` for API list endpoints
- Called from `_apply_workspace_scope_filters()` for workspace regions
- Both paths must behave identically (same function, same logic)

Evaluation order:
1. If no cedar_access_spec → no scope filtering (unauthenticated/no-auth app)
2. If cedar_access_spec but no scope rules → pass through (no row filter)
3. Collect ALL matching scope rules for user's roles (not first-match!)
4. If ANY matching rule is unconditional (scope: all) → return {} (no filter)
5. Otherwise apply the first resolvable predicate filter

For dual-role users (e.g. super_admin + school_admin):
- The most permissive matching rule wins
- scope: all on ANY role overrides restrictive scopes on other roles
"""
limitations = """
- Predicate compilation is structural — it doesn't evaluate the predicate
  against actual data, just compiles to SQL
- UserAttrRef markers in params must be resolved at request time by the
  route handler (not by the compiler)
- OR-combination of multiple restrictive scope rules for different roles
  is not yet implemented — only scope:all override works for dual-role
"""
implemented_by = [
    {fn = "dazzle_back.runtime.route_generator._resolve_scope_filters", purpose = "collects matching scope rules, returns most-permissive filter or None for deny"},
    {fn = "dazzle_back.runtime.route_generator._resolve_predicate_filters", purpose = "compiles ScopePredicate to SQL and resolves UserAttrRef markers"},
    {fn = "dazzle_back.runtime.route_generator._list_handler_body", purpose = "applies scope filters to entity list API queries"},
    {fn = "dazzle_back.runtime.workspace_rendering._apply_workspace_scope_filters", purpose = "applies scope filters to workspace region data queries"},
    {fn = "dazzle_back.runtime.predicate_compiler.compile_predicate", purpose = "converts ScopePredicate tree to (sql, params) WHERE fragment"},
    {fn = "dazzle.core.ir.predicate_builder.build_scope_predicate", purpose = "converts DSL ConditionExpr to typed ScopePredicate algebra"},
]
known_issues = [
    "#595: Scope predicates not applied on API list (fixed: _noauth_handler)",
    "#604: Dual-role users get wrong scope (fixed: most-permissive-wins + Tautology detection)",
    "#607: No scope: blocks returned 0 rows (fixed: pass-through)",
    "#591: Null FK poisoning in scope evaluation",
]

[concepts.scope_default_behaviour]
category = "Runtime Contract"
definition = """
What happens when an entity has permit: rules but no scope: blocks.
"""
runtime_behaviour = """
- The permit gate controls entity-level access (can this persona list/create/etc?)
- The scope layer controls row-level filtering (which rows can they see?)
- If permit: exists but scope: is absent → NO row filter is applied
- All rows visible to the permitted persona (permit gate already passed)
- To restrict rows, explicitly add scope: blocks

This means:
  permit: viewer can list    → viewer can access the list endpoint
  (no scope: blocks)         → viewer sees ALL rows

To restrict:
  scope list: owner = current_user for: viewer
"""
important_notes = [
    "permit: without scope: means ALL rows visible (not zero rows)",
    "scope: blocks are optional — their absence means no row-level filter",
    "scope: all for: * is redundant when no scope blocks exist, but documents intent",
]

# =============================================================================
# RBAC / Permit Evaluation
# =============================================================================

[concepts.permit_runtime]
category = "Runtime Contract"
definition = """
How permit rules are evaluated at runtime (the Cedar three-rule evaluation).
"""
runtime_behaviour = """
Entry point: `_extract_cedar_row_filters()` in route_generator.py

Evaluation order (per entity × operation):
1. If entity has no access spec → UNPROTECTED (all access granted)
2. FORBID rules checked first — if any forbid matches, 403 (forbid always wins)
3. PERMIT rules checked — if any permit matches the user's role, access granted
4. No permit matches → ACCESS_DENIED (403)

After permit gate passes, scope rules are evaluated for row filtering.
"""
implemented_by = [
    "dazzle_back.runtime.route_generator._extract_cedar_row_filters",
    "dazzle_back.runtime.route_generator._extract_condition_filters",
]

[concepts.visible_directive]
category = "Runtime Contract"
definition = """
The `visible:` directive on surface elements controls field-level visibility
based on persona roles. It operates at three levels with different semantics.
"""
runtime_behaviour = """
Three levels:
1. List column `visible:` — controls which columns appear in the table header
   and row cells. Evaluated during template compilation, not at request time.
2. Detail field `visible:` — controls which fields appear on the detail page.
3. Form field `visible:` — controls which fields appear on create/edit forms.

Implementation:
- Template compiler evaluates `visible:` at page render time
- The check is: does the current user's role match the visible: condition?
- If not matched, the field/column is omitted from the HTML output

IMPORTANT: `visible:` is a UI-layer concern. It does NOT prevent the field
from being returned in the API JSON response. For API-level field hiding,
use view-based projections (select_fields).
"""
implemented_by = [
    "dazzle_ui.converters.template_compiler._should_show_element",
    "dazzle_ui.runtime.page_routes._build_table_columns",
]
known_issues = [
    "#585: visible: on list columns renders for all roles (not enforced)",
    "#587: visible: evaluates to False for ALL roles (regression)",
]

# =============================================================================
# CSRF Protection
# =============================================================================

[concepts.csrf]
category = "Runtime Contract"
definition = """
Double-submit cookie CSRF protection. Prevents cross-site request forgery
on state-changing operations (POST/PUT/DELETE/PATCH).
"""
runtime_behaviour = """
Implementation: Pure ASGI middleware in csrf.py (not BaseHTTPMiddleware —
BaseHTTPMiddleware has a known body consumption bug in Starlette).

Flow:
1. On any request, check for `dazzle_csrf` cookie
2. If absent, generate a new token and set it as a cookie (httponly=False)
3. For safe methods (GET/HEAD/OPTIONS) → pass through
4. For mutation methods → validate X-CSRF-Token header matches cookie
5. If mismatch → 403 {"detail": "CSRF token missing or invalid"}

Exempt paths (no CSRF validation required):
- /health, /docs, /openapi.json, /redoc
- /webhooks/*, /api/v1/webhooks/*
- /__test__/* (test mode endpoints)
- /dazzle/dev/* (dev control plane)
- /auth/* (login/signup — establish sessions, don't consume them)
- Bearer-authenticated requests (JWT proves non-CSRF)

Client integration:
- htmx: base.html injects X-CSRF-Token from cookie on htmx:configRequest
- Test runners: auto-acquire token via GET /health, inject on mutations
- httpx/requests: use a Session to persist cookies across requests
"""
implemented_by = [
    "dazzle_back.runtime.csrf.CSRFMiddleware",
    "dazzle_back.runtime.csrf.apply_csrf_protection",
]
known_issues = [
    "#606: BaseHTTPMiddleware consumed body (fixed: pure ASGI rewrite)",
    "#605: Test runners lacked CSRF tokens (fixed: auto-acquire)",
    "#597: CSRF not validated on mutations (fixed: middleware added)",
]

# =============================================================================
# Route Registration
# =============================================================================

[concepts.route_registration]
category = "Runtime Contract"
definition = """
How API routes are registered and matched by FastAPI.
"""
runtime_behaviour = """
FastAPI uses first-match-wins for route matching. Registration order matters.

Route registration sequence in RouteGenerator.generate_all_routes():
1. Guard routes registered FIRST: /{entity}s/create → 404
   (prevents 'create' being parsed as a UUID {id} parameter)
2. Main routes sorted by: more segments first, static before dynamic
3. This ensures /tasks/create matches before /tasks/{id}

The sort key: (-segment_count, 0 if static else 1)
- /tasks/bulk-delete (static, 2 segments) → sorted before
- /tasks/{id} (dynamic, 2 segments) → sorted after
- /tasks (1 segment) → sorted last
"""
implemented_by = [
    "dazzle_back.runtime.route_generator.RouteGenerator.generate_all_routes",
    "dazzle_back.runtime.route_generator.RouteGenerator.generate_route",
]
known_issues = ["#598: /create parsed as UUID (fixed: guard routes first)"]

