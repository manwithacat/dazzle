[concepts.process_steps]
category = "Workflow"
doc_page = "processes"
doc_order = 2
definition = """
Process step kinds define the type of activity in a workflow. Each step has a kind
that determines its behaviour and required fields.

Step kinds:
- service: Call a domain service
- send: Send a message via channel
- wait: Wait for a duration or signal
- human_task: Wait for a human action (renders a surface with outcome buttons)
- subprocess: Start another process
- parallel: Execute steps concurrently
- condition: Conditional branch (on_true/on_false goto)
- side_effect: Execute effects only (create/update entities)
- query: Query entities matching a filter
- foreach: Iterate over results from a previous step
- llm_intent: Execute an LLM intent
"""
syntax = '''
steps:
  - step <name>:
      kind: <service|send|wait|human_task|subprocess|parallel|condition|side_effect|query|foreach|llm_intent>

      # For SERVICE:
      service: <ServiceName>

      # For SEND:
      channel: <channel_name>
      message: <message_type>

      # For WAIT:
      wait_duration_seconds: <int>
      wait_for_signal: "<signal_name>"

      # For HUMAN_TASK:
      human_task:
        surface: <surface_name>
        assignee_role: <role>
        outcomes:
          - name: approve
            label: "Approve"
            goto: <next_step|complete|fail>

      # For CONDITION:
      condition: "<expression>"
      on_true: <step_name>
      on_false: <step_name>

      # For LLM_INTENT:
      llm_intent: <intent_name>

      # Common options:
      [timeout: <duration>]
      [retry:]
        [max_attempts: <int>]
        [backoff: <fixed|exponential|linear>]
      [on_success: <step_name>]
      [on_failure: <step_name>]
      [compensate_with: <handler_name>]
'''
example = '''
process expense_approval "Expense Approval":
  trigger: entity ExpenseReport status -> submitted

  steps:
    - step validate:
        kind: service
        service: validate_expense
        timeout: 30s

    - step review:
        kind: human_task
        human_task:
          surface: expense_review
          assignee_role: manager
          outcomes:
            - name: approve
              label: "Approve Expense"
              goto: complete
            - name: reject
              label: "Reject"
              goto: fail

    - step notify:
        kind: send
        channel: notifications
        message: ExpenseDecision
'''
related = ["process", "schedule", "story"]
best_practices = ["Use service steps for business logic, send for notifications", "Use human_task for approval workflows with explicit outcome buttons", "Use parallel with fail_fast policy for independent operations", "Set compensate_with for steps that need saga rollback"]

[concepts.channel]
category = "Messaging (v0.9)"
doc_page = "messaging"
doc_order = 1
definition = """
A messaging channel definition for communication pathways. Channels define how
messages flow through the system with three kinds: email (human-readable),
queue (reliable async processing), and stream (event sourcing with replay).

Channels contain send operations (outbound) and receive operations (inbound),
each with message type references, triggers, field mappings, and throttling.
"""
syntax = '''
channel <name> ["<Title>"]:
  kind: <email|queue|stream>
  provider: <auto|mailpit|sendgrid|...>

  [config:]
    [from_address: "<email>"]
    [from_name: "<name>"]
    [dead_letter_after: <int>]           # queue
    [retention: <duration>]              # stream
    [partition_key: <field>]             # stream

  [provider_config:]
    [max_per_minute: <int>]
    [max_concurrent: <int>]

  [send <operation_name>:]
    [message: <MessageName>]
    [when: entity <Entity> <event>]
    [when: entity <Entity> status -> <state>]
    [delivery_mode: <outbox|direct>]
    [mapping:]
      [<target> -> <source.path>]
    [throttle:]
      [per_recipient:]
        [window: <duration>]
        [max_messages: <int>]
        [on_exceed: <drop|error|log>]

  [receive <operation_name>:]
    [message: <MessageName>]
    [match:]
      [<field>: "<pattern>"]
    [action: <create|update|upsert> <EntityName>]
    [mapping:]
      [<source> -> <target>]
'''
example = '''
channel notifications "Email Notifications":
  kind: email
  provider: auto

  config:
    from_address: "noreply@example.com"
    from_name: "My App"

  send welcome:
    message: WelcomeEmail
    when: entity User created
    delivery_mode: outbox
    mapping:
      to -> User.email
      name -> User.display_name

  send order_shipped:
    message: ShipmentNotice
    when: entity Order status -> shipped
    mapping:
      to -> Order.customer.email
      order_number -> Order.number

  receive support:
    message: InboundEmail
    match:
      to: "support@example.com"
    action: create SupportTicket
    mapping:
      from -> requester_email
      subject -> title
      body -> description
'''
related = ["process_steps", "entity"]
best_practices = ["Use outbox delivery for transactional consistency", "Set throttle limits to prevent email flooding", "Use queue channels for async processing pipelines", "Use stream channels for event sourcing with replay"]

[concepts.approval]
category = "Governance (v0.25)"
doc_page = "governance"
doc_order = 1
definition = """
A first-class approval gate definition. Approvals intercept entity state transitions
and require human sign-off before proceeding. Features include quorum (number of
approvals needed), threshold conditions (when approval is required), escalation
timers, auto-approve rules, and outcome mappings to entity status transitions.
"""
syntax = '''
approval <name> "<Title>":
  entity: <EntityName>
  trigger: <field> -> <value>
  approver_role: <role_name>
  [quorum: <int>]
  [threshold: <condition>]
  [escalation:]
    [after: <int> <hours|days>]
    [to: <escalation_role>]
  [auto_approve:]
    [when: <condition>]
  [outcomes:]
    [<decision> -> <target_status>]
'''
example = '''
approval PurchaseApproval "Purchase Order Approval":
  entity: PurchaseOrder
  trigger: status -> pending_approval
  approver_role: finance_manager
  quorum: 1
  threshold: amount > 1000
  escalation:
    after: 48 hours
    to: finance_director
  auto_approve:
    when: amount <= 100
  outcomes:
    approved -> approved
    rejected -> rejected

approval LeaveRequest "Leave Approval":
  entity: LeaveRequest
  trigger: status -> submitted
  approver_role: line_manager
  quorum: 1
  outcomes:
    approved -> approved
    rejected -> rejected
'''
related = ["entity", "state_machine", "sla", "process"]
best_practices = ["Use threshold to skip approval for low-value items", "Set escalation to avoid approval bottlenecks", "Use auto_approve for items below a safe threshold", "Map outcomes to entity status transitions for clean workflow"]

[concepts.sla]
category = "Governance (v0.25)"
doc_page = "governance"
doc_order = 2
definition = """
A Service Level Agreement definition with deadline tiers, business hours, and
breach actions. SLAs track time between state transitions on entities using
starts_when, pauses_when, and completes_when conditions. Multiple tiers
(warning, breach, critical) define escalation levels. Business hours ensure
SLA clocks only run during working time.
"""
syntax = '''
sla <name> "<Title>":
  entity: <EntityName>
  starts_when: <field> -> <value>
  [pauses_when: <field> = <value>]
  completes_when: <field> -> <value>
  tiers:
    <tier_name>: <int> <hours|days|minutes>
    ...
  [business_hours:]
    [schedule: "<Mon-Fri HH:MM-HH:MM>"]
    [timezone: "<IANA_timezone>"]
  [on_breach:]
    [notify: <role_name>]
    [set: <field> = <value>]
'''
example = '''
sla TicketResponse "Ticket Response SLA":
  entity: SupportTicket
  starts_when: status -> open
  pauses_when: status = on_hold
  completes_when: status -> resolved
  tiers:
    warning: 4 hours
    breach: 8 hours
    critical: 24 hours
  business_hours:
    schedule: "Mon-Fri 09:00-17:00"
    timezone: "Europe/London"
  on_breach:
    notify: support_lead
    set: escalated = true

sla OrderFulfillment "Order Fulfillment SLA":
  entity: Order
  starts_when: status -> confirmed
  completes_when: status -> shipped
  tiers:
    warning: 1 days
    breach: 3 days
'''
related = ["entity", "state_machine", "approval", "process"]
best_practices = ["Use business_hours to exclude non-working time from SLA calculations", "Set tiers for progressive escalation (warning before breach)", "Use on_breach to notify responsible roles and flag records", "Use pauses_when for states where the clock should stop (e.g., on_hold)"]

[concepts.webhook]
category = "Integrations (v0.25)"
doc_page = "integrations"
doc_order = 3
definition = "Outbound HTTP notification triggered by entity lifecycle events (created, updated, deleted). Webhooks send JSON payloads to external URLs with configurable authentication (HMAC-SHA256, bearer, basic), field selection, and retry policies."
syntax = '''
webhook <name> "<Title>":
  entity: <EntityName>
  events: [created, updated, deleted]
  url: config("<ENV_VAR>") | "<url>"
  [auth:]
    [method: <hmac_sha256|bearer|basic>]
    [secret: config("<ENV_VAR>")]
  [payload:]
    [include: [<field1>, <field2>, <entity.field>]]
    [format: json]
  [retry:]
    [max_attempts: <int>]
    [backoff: <exponential|linear>]
'''
example = '''
webhook OrderNotification "Order Status Webhook":
  entity: Order
  events: [created, updated]
  url: config("ORDER_WEBHOOK_URL")
  auth:
    method: hmac_sha256
    secret: config("WEBHOOK_SECRET")
  payload:
    include: [id, status, total, customer.name]
    format: json
  retry:
    max_attempts: 3
    backoff: exponential

webhook AuditLog "Audit Event Webhook":
  entity: AuditEntry
  events: [created]
  url: config("AUDIT_WEBHOOK_URL")
  auth:
    method: bearer
    secret: config("AUDIT_API_KEY")
'''
related = ["entity", "integration", "channel"]
best_practices = ["Use config() for URLs and secrets - never hardcode credentials", "Use HMAC-SHA256 for webhook signature verification", "Select only needed fields in payload to minimize data exposure", "Set retry with exponential backoff for resilient delivery"]

[concepts.llm_trigger]
category = "LLM Jobs (v0.24)"
doc_page = "llm"
doc_order = 4
definition = "A trigger clause on an llm_intent that fires the intent automatically when an entity lifecycle event occurs. Supports input_map to pass entity fields to the intent, write_back to store results on the entity, and an optional when condition for conditional triggering."
syntax = '''
llm_intent <name> "<Title>":
  ...
  trigger:
    on_entity: <EntityName>
    on_event: <created|updated|deleted>
    [input_map:]
      [<intent_input>: entity.<field>]
    [write_back:]
      [<Entity.field>: output]
    [when: "<condition_expression>"]
'''
example = '''
# Auto-classify tickets on creation
llm_intent classify_ticket "Classify Support Ticket":
  model: claude_haiku
  prompt: "Classify this ticket: {{ input.description }}"
  timeout: 15
  trigger:
    on_entity: Ticket
    on_event: created
    input_map:
      description: entity.description
    write_back:
      Ticket.category: output
    when: "entity.category == null"
'''
related = ["llm_intent", "llm_model", "entity"]
best_practices = ["Use input_map to pass only the fields the LLM needs", "Use write_back to store classification results on the entity", "Use when to avoid re-triggering on already-classified records", "Keep trigger intents fast (low timeout) to avoid blocking entity creation"]

[concepts.llm_concurrency]
category = "LLM Jobs (v0.24)"
doc_page = "llm"
doc_order = 5
definition = "Concurrency configuration for LLM models within llm_config. Sets maximum concurrent requests per model to prevent overloading providers. Works alongside rate_limits (requests per minute) to control LLM API usage."
syntax = '''
llm_config:
  ...
  concurrency:
    <model_name>: <max_concurrent_requests>
    <model_name>: <max_concurrent_requests>

  rate_limits:
    <model_name>: <requests_per_minute>
'''
example = '''
llm_config:
  default_model: claude_sonnet
  artifact_store: local
  logging:
    log_prompts: true
    log_completions: true
    redact_pii: true
  rate_limits:
    claude_haiku: 100
    claude_sonnet: 60
    gpt4o_mini: 50
  concurrency:
    claude_haiku: 10
    claude_sonnet: 5
    gpt4o_mini: 3
'''
related = ["llm_config", "llm_model", "llm_intent"]
best_practices = ["Set concurrency lower than rate_limits to leave headroom", "Fast-tier models (haiku) can handle higher concurrency", "Quality-tier models should have lower concurrency to manage costs", "Monitor budget_alert_usd to catch runaway LLM usage"]

[concepts.environment_profiles]
category = "Project Configuration"
since_version = "0.49.2"
definition = """
Per-environment database configuration in dazzle.toml. Declare [environments.<name>] sections \
with database_url (literal) or database_url_env (env var indirection) and optional heroku_app. \
Select at runtime via --env flag or DAZZLE_ENV environment variable. Profile names are freeform \
strings — development/staging/production, blue/green, demo, per-developer, etc.

Resolution priority:
1. --database-url (explicit CLI flag — always wins)
2. --env profile (database_url or database_url_env from named profile)
3. DATABASE_URL environment variable
4. dazzle.toml [database].url
5. Default: postgresql://localhost:5432/dazzle
"""
syntax = '''
[environments.development]
database_url = "postgresql://localhost:5432/myapp_dev"

[environments.staging]
database_url_env = "HEROKU_POSTGRESQL_COPPER_URL"
heroku_app = "myapp-staging"

[environments.production]
database_url_env = "HEROKU_POSTGRESQL_COPPER_URL"
heroku_app = "myapp-prod"
'''
example = '''
# Select environment via CLI flag
dazzle db status --env staging

# Or via environment variable (CI/CD)
export DAZZLE_ENV=production
dazzle db status

# --database-url always wins, regardless of --env
dazzle db status --env production --database-url postgresql://override:5432/db
'''
related = ["authentication", "schedule"]
