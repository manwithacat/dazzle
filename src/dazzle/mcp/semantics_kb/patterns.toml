[patterns.business_logic_pattern]
doc_page = "patterns"
name = "Business Logic Pattern"
description = "Complete entity with state machine, invariants, computed fields, and access rules"
v0_7_feature = true
components = ["State machine with guarded transitions", "Computed fields for derived values", "Invariants for cross-field validation", "Access rules for row-level security"]
example = '''
# Complete v0.7.0 Entity with Business Logic
entity Ticket "Support Ticket":
  id: uuid pk
  ticket_number: str(20) unique
  title: str(200) required
  description: text required
  status: enum[open,in_progress,resolved,closed]=open
  priority: enum[low,medium,high,critical]=medium
  created_by: ref User required
  assigned_to: ref User
  resolution: text
  created_at: datetime auto_add
  updated_at: datetime auto_update

  # Computed field: days since opened
  days_open: computed days_since(created_at)

  # State machine: ticket lifecycle
  transitions:
    open -> in_progress: requires assigned_to
    in_progress -> resolved: requires resolution
    in_progress -> open
    resolved -> closed
    resolved -> in_progress
    closed -> open: role(manager)

  # Invariants: data integrity rules
  # IMPORTANT: Use single = for equality (not ==)
  invariant: status != resolved or resolution != null
  invariant: status != closed or resolution != null
  invariant: priority != critical or assigned_to != null

  # Access rules: visibility and permissions
  access:
    read: created_by = current_user or role(agent) or role(manager)
    write: role(agent) or role(manager)

  # Indexes for performance
  index status, priority
  index assigned_to
'''
use_cases = ["Workflow systems (tickets, orders, approvals)", "Document lifecycle management", "Multi-role applications with row-level security", "Data integrity enforcement at the model level"]
related = ["state_machine", "invariant", "computed_field", "access_rules"]

[patterns.cedar_rbac]
doc_page = "patterns"
name = "Cedar-Style RBAC Pattern"
description = "Role-based entity access using permit/forbid/audit blocks with NIST SP 800-162 alignment. Supports separation of duty, least privilege, default-deny, and audit trail requirements."
v0_21_feature = true
components = ["Role hierarchy via role() conditions", "Separation of duty via forbid: blocks", "Data segregation via entity-level policies", "Immutability of audit records", "Default-deny evaluation (FORBID > PERMIT > deny)", "Audit trail via audit: blocks"]
example = '''
# Cedar-style RBAC for a medical clinic
entity Prescription "Prescription":
  id: uuid pk
  patient: ref Patient required
  prescriber: ref Doctor required
  medication: str(200) required
  dosage: str(100) required
  status: enum[draft,active,dispensed,cancelled]=draft

  # Permit: who CAN perform actions
  permit:
    read: role(doctor) or role(pharmacist) or role(nurse)
    prescribe: role(doctor)
    dispense: role(pharmacist)
    cancel: role(doctor) or role(pharmacist)

  # Forbid: separation of duty overrides
  forbid:
    prescribe: role(pharmacist)
    dispense: role(doctor)

  # Audit: compliance logging
  audit:
    read: role(admin)
    prescribe: role(compliance_officer)
    dispense: role(compliance_officer)
    cancel: role(compliance_officer)

  transitions:
    draft -> active: role(doctor)
    active -> dispensed: role(pharmacist)
    active -> cancelled: role(doctor) or role(pharmacist)
'''
use_cases = ["Healthcare (HIPAA, prescription workflows)", "Finance (SOX compliance, transaction approval)", "Government (clearance-based access)", "Any domain requiring separation of duty or audit trails"]
related = ["access_rules", "role_based_access", "business_logic_pattern", "rbac_validation"]

