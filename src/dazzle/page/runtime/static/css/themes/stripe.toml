# App-shell theme manifest — sibling of stripe.css.

name = "stripe"
description = "Stripe-formal cool slate + indigo + generous spacing for B2B SaaS"
inspired_by = "Stripe Dashboard"

default_color_scheme = "light"

# stripe.css references Inter Tight (sans) + Geist Mono (code).
# Inter (regular) is always preconnected by base.html as the universal
# fallback; we only add the theme-specific extras here.
font_preconnect = [
  "https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap",
  "https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap",
]

tags = ["light", "formal", "b2b", "fintech", "saas"]
