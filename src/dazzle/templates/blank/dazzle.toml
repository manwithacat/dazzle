[project]
name = "{{project_name}}"
version = "0.1.0"
root = "{{module_name}}.core"
framework_version = "~0.38"

[modules]
paths = ["./dsl"]

[auth]
enabled = true
provider = "session"
allow_registration = true

# LLM cognition driver — how dev-time agents (`dazzle qa trial`, spec
# analysis) and local `llm_intent` testing reach a Claude model.
#
#   "claude-cli"    = Claude Code CLI, billed to your Claude subscription.
#                     No API key needed — install https://claude.com/claude-code
#                     and sign in once with `claude`. Development only.
#   "anthropic-api" = metered Anthropic API via ANTHROPIC_API_KEY.
#                     Required when you deploy.
#   "auto"          = anthropic-api if ANTHROPIC_API_KEY is set, else claude-cli.
#
# Ready to deploy? Create a key at https://console.anthropic.com/settings/keys,
# set ANTHROPIC_API_KEY in the deployment environment, and switch this to
# "anthropic-api". Full dev → deploy path: docs/reference/llm-drivers.md
# (`dazzle doctor` checks this for you).
[llm]
driver = "claude-cli"

# Environment profiles — select via: dazzle <command> --env <name>
# Or set DAZZLE_ENV=<name> for CI/CD.
# Priority: --database-url > --env profile > DATABASE_URL > [database].url > default
#
# [environments.development]
# database_url = "postgresql://localhost:5432/{{project_name}}_dev"
#
# [environments.staging]
# database_url_env = "HEROKU_POSTGRESQL_COPPER_URL"
# heroku_app = "{{project_name}}-staging"
#
# [environments.production]
# database_url_env = "HEROKU_POSTGRESQL_COPPER_URL"
# heroku_app = "{{project_name}}-prod"
