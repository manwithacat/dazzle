[project]
name = "{{project_name}}"
version = "0.1.0"
root = "{{module_name}}.core"
framework_version = "~{{framework_minor}}"

[modules]
paths = ["./dsl"]

[auth]
enabled = true
provider = "session"
allow_registration = true

# LLM cognition driver — how dev-time agents (`dazzle qa trial`, spec
# analysis) and local `llm_intent` testing reach a model.
#
# Subscription (development only — never production):
#   "claude-cli"    = Claude Code CLI → Claude subscription
#   "grok-cli"      = Grok Build CLI → Grok subscription (`grok login`)
# Metered (deploy path):
#   "anthropic-api" = Anthropic API via ANTHROPIC_API_KEY
# Auto:
#   "auto"          = anthropic-api if ANTHROPIC_API_KEY is set, else the
#                     first available subscription CLI (claude-cli, then grok-cli)
#
# Ready to deploy? Create a key at https://console.anthropic.com/settings/keys,
# set ANTHROPIC_API_KEY, and switch to "anthropic-api". Full path:
# docs/reference/llm-drivers.md (`dazzle doctor` checks this for you).
[llm]
driver = "auto"

# Environment profiles — select via: dazzle <command> --env <name>
# Or set DAZZLE_ENV=<name> for CI/CD.
# Priority: --database-url > --env profile > DATABASE_URL > [database].url > default
#
# [environments.development]
# database_url = "postgresql://localhost:5432/{{project_name}}_dev"
#
# [environments.staging]
# database_url_env = "HEROKU_POSTGRESQL_COPPER_URL"
# heroku_app = "{{project_name}}-staging"
#
# [environments.production]
# database_url_env = "HEROKU_POSTGRESQL_COPPER_URL"
# heroku_app = "{{project_name}}-prod"
