<dialog id="dz-detail-drawer" class="dz-drawer" data-dz-side="right" closedby="any" aria-label="Detail">
  <div class="dz-drawer-header">
    <button type="button" class="dz-drawer-button" onclick="window.dzDrawer.close()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      Close
    </button>
    <a id="dz-drawer-expand" hidden class="dz-drawer-button">
      Open full page
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
    </a>
  </div>
  <div id="dz-detail-drawer-content" class="dz-drawer-content"></div>
</dialog>
<script>
(function() {
  // The detail drawer is now a native <dialog>: showModal() gives the
  // backdrop, background-inert, focus-trap and Esc dismiss for free — so
  // the old hand-rolled backdrop element, `.is-open` transform toggle and
  // manual Escape handler are gone (the HM `dz-drawer` Hyperpart supplies
  // the edge-anchor + slide via `dialog.dz-drawer`).
  //
  // Preserved (the contract the rest of the app + the ux-verify runner rely
  // on): the `window.dzDrawer.open(url)` / `.close()` / `.isOpen` API, the
  // `#dz-detail-drawer-content` htmx swap target, the `#dz-drawer-expand`
  // link, the #980 htmx-not-loaded fallback, and the #934 defensive close.
  //
  // #934 still applies: this markup is re-emitted on every workspace nav
  // swap, so DOCUMENT-level listeners register exactly once (init guard) and
  // every call looks its elements up fresh; DIALOG-level listeners (native
  // close cleanup + backdrop-tap) are wired per-element and idempotent, so a
  // re-emitted drawer node rewires cleanly.
  function _qd(id) { return document.getElementById(id); }

  function _wire(drawer) {
    if (drawer.__dzWired) return;
    drawer.__dzWired = true;
    // any native close (our close(), Esc, or backdrop) restores page scroll
    drawer.addEventListener('close', function() {
      document.body.classList.remove('overflow-hidden');
    });
    // backdrop tap: a click on the <dialog> element itself (not its content)
    // is the ::backdrop area. closedby="any" covers browsers that support it;
    // this is the cross-browser floor.
    drawer.addEventListener('click', function(e) {
      if (e.target === drawer) window.dzDrawer.close();
    });
  }

  window.dzDrawer = {
    get isOpen() { var d = _qd('dz-detail-drawer'); return !!(d && d.open); },
    open: function(url) {
      var drawer = _qd('dz-detail-drawer');
      var expand = _qd('dz-drawer-expand');
      if (!drawer) return;
      if (url && expand) { expand.href = url; expand.hidden = false; }
      else if (expand) { expand.hidden = true; }
      _wire(drawer);
      if (!drawer.open) drawer.showModal();
      document.body.classList.add('overflow-hidden');
    },
    close: function() {
      var drawer = _qd('dz-detail-drawer');
      if (drawer && drawer.open) drawer.close();  // fires 'close' → scroll restore
      else document.body.classList.remove('overflow-hidden');
    }
  };

  if (window.__dzDrawerInit) return;
  window.__dzDrawerInit = true;

  document.body.addEventListener('dz:drawerOpen', function(e) {
    var url = (e.detail && e.detail.url) || '';
    window.dzDrawer.open(url);
  });

  // Click delegation on document.body — the drawer content node is recreated
  // on every workspace render, so we can't bind directly to it. Filter to
  // clicks INSIDE the live drawer content element.
  document.body.addEventListener('click', function(e) {
    var content = _qd('dz-detail-drawer-content');
    if (!content || !content.contains(e.target)) return;
    var link = e.target.closest('a[href]');
    if (!link) return;
    if (link.hasAttribute('hx-get')) return;
    var href = link.getAttribute('href');
    if (!href || href === '#') return;
    if (link.textContent.trim().match(/back/i)) {
      e.preventDefault();
      window.dzDrawer.close();
      return;
    }
    if (href.startsWith('/')) {
      e.preventDefault();
      // #980 round 2: guard against htmx not yet loaded (this handler is
      // registered at script-parse time, before the deferred htmx.min.js).
      if (typeof htmx === 'undefined') {
        window.location.href = href;
        return;
      }
      htmx.ajax('GET', href, {target: '#dz-detail-drawer-content', swap: 'innerHTML'});
    }
  });

  // #934: defensive close on any swap that doesn't target the drawer content.
  // Workspace→workspace nav uses `hx-target="#main-content"`; the modal now
  // makes the background inert (so a user can't trigger this while open), but
  // programmatic nav / re-emission still can. The event is htmx-4's camelCase
  // `htmx:afterSettle` (the old `htmx:after:settle` never fired). The scroll
  // lock is released DIRECTLY on `body` — not via the dialog's `close` event —
  // because a swap can DESTROY the open drawer node (it's re-emitted inside the
  // `#main-content` body), and a removed dialog fires no `close`, so a
  // node-scoped unlock would leak `overflow-hidden`.
  document.body.addEventListener('htmx:afterSettle', function(e) {
    var target = e.detail && e.detail.target;
    if (target && target.id === 'dz-detail-drawer-content') return;
    var drawer = _qd('dz-detail-drawer');
    if (drawer && drawer.open) drawer.close();
    document.body.classList.remove('overflow-hidden');
  });
})();
</script>
