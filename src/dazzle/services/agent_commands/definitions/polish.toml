[command]
name = "polish"
version = "1.1.0"
title = "Polish"
description = "Surface-level UX polish cycle — audit, investigate, fix, verify."
pattern = "loop"
batch_compatible = false

[maturity]
min_entities = 1
min_surfaces = 3
requires_running_app = true
requires = ["validate"]

[loop]
backlog_file = "agent/polish-backlog.md"
log_file = "agent/polish-log.md"
lock_file = "agent/polish.lock"
max_cycles = 50
stale_lock_minutes = 30

[signals]
# React to shipped fixes so polish doesn't re-report the same issue.
consume = [
    "fix-committed",
    "ux-component-shipped",
]
# Other loops can tune their behaviour when polish reaches steady state.
emit = [
    "polish-complete",
]

[tools]
mcp = ["composition.audit", "dsl.validate", "dsl.inspect_surface", "sentinel.findings"]
cli = [
    "dazzle validate",
    "dazzle ux verify",
    "dazzle agent signals",
    "gh issue list",
]

[skill_template]
file = "polish.md.j2"
