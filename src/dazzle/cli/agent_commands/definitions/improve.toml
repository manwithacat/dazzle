[command]
name = "improve"
version = "1.0.0"
title = "Improve"
description = "Autonomous improvement loop — find gaps, fix them, verify, commit."
pattern = "loop"

[maturity]
min_entities = 1
requires = ["validate"]

[loop]
backlog_file = "agent/improve-backlog.md"
log_file = "agent/improve-log.md"
lock_file = "agent/improve.lock"
max_cycles = 50
stale_lock_minutes = 30

[tools]
mcp = ["dsl.lint", "dsl.validate", "dsl.analyze"]
cli = ["dazzle validate", "dazzle lint"]

[skill_template]
file = "improve.md.j2"
