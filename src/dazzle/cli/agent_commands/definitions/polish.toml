[command]
name = "polish"
version = "1.0.0"
title = "Polish"
description = "UX polish loop — refine surfaces in a running app."
pattern = "loop"

[maturity]
min_surfaces = 3
requires_running_app = true

[loop]
backlog_file = "agent/polish-backlog.md"
log_file = "agent/polish-log.md"
lock_file = "agent/polish.lock"
max_cycles = 50
stale_lock_minutes = 30

[tools]
mcp = ["dsl.validate", "dsl.inspect_surface", "composition.audit"]
cli = ["dazzle validate", "dazzle ux verify"]

[skill_template]
file = "polish.md.j2"
