site_name: Dazzle Developer Docs
site_description: Developer documentation for Dazzle - DSL-first toolkit for building apps from high-level specifications.
site_url: https://manwithacat.github.io/dazzle/
repo_url: https://github.com/manwithacat/dazzle
repo_name: manwithacat/dazzle
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.action.edit
    - content.action.view
    - content.code.copy
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

