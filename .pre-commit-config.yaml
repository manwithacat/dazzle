# Pre-commit hooks for DAZZLE
# See https://pre-commit.com for more information
# Slow hooks (bandit, pytest, parser-corpus, pra-unit, mcp-verify) moved to CI.
# Use `/check` for on-demand quality gate.

default_language_version:
  python: python3

repos:
  # General file cleanup
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        # Exclude human-edited release/governance docs — the trailing-space
        # strip caused ~50 agent-Edit failures across recent releases
        # (#1063) because the file changes between Edit and the next
        # Edit's read-cache, breaking the agent's mental model.
        # Also exclude hash-pinned vendored deps and generated dist/ bundles:
        # the update-vendors bot commits them byte-exact (via Actions, which
        # bypasses pre-commit) and vendor_hashes.json pins their checksum, so
        # whitespace-normalising them here corrupts the integrity hash.
        exclude: ^(CHANGELOG\.md|ROADMAP\.md)$|/static/(vendor|dist)/|/__snapshots__/(data_row_char_1505|legacy_detail_chrome)/
      - id: end-of-file-fixer
        exclude: ^(CHANGELOG\.md|ROADMAP\.md)$|/static/(vendor|dist)/|/__snapshots__/(data_row_char_1505|legacy_detail_chrome)/
      - id: check-yaml
        exclude: mkdocs\.yml$  # Uses PyYAML-specific tags
      - id: check-toml
      - id: check-added-large-files
        # 2000: the vendored PDF.js module worker (pdf.worker.min.mjs,
        # ~1.4MB, hash-pinned in scripts/vendor_hashes.json) is the
        # largest legitimate asset — hx-pdf P3.
        args: ['--maxkb=2000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: /static/(vendor|dist)/

  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      # Run the linter
      - id: ruff
        args: ['--fix']
      # Run the formatter
      - id: ruff-format

  # Local hooks (fast only)
  - repo: local
    hooks:
      # Validate Homebrew formula syntax
      - id: homebrew-validate
        name: homebrew-validate
        entry: ruby -c
        language: system
        files: ^homebrew/.*\.rb$
        pass_filenames: true
        stages: [pre-commit]

      # Verify PyPI wheel URLs are valid (checks that URLs exist)
      - id: verify-pypi-urls
        name: verify-pypi-urls
        entry: bash scripts/verify-pypi-urls.sh
        language: system
        files: ^(homebrew/.*\.rb|\.github/workflows/release-cli\.yml)$
        pass_filenames: true
        stages: [pre-push]

# Configuration for specific hooks can be added to pyproject.toml
