# trial.toml — qualitative user trial scenarios for `dazzle qa trial` (gen-2).
#
# Replace every <PLACEHOLDER> with something specific to your domain.
# Run: dazzle qa trial --fresh-db
#
# Read .agents/skills/qa-trial/SKILL.md and docs/reference/qa-trial-gen2.md
# before editing — scenario shape matters more than length.

[[scenario]]
# Internal handle for this scenario; pass via --scenario to select it.
name = "<SCENARIO_NAME>"

# The DSL persona ID to authenticate as. Must exist in your dazzle.toml
# or personas DSL. Not a display name — the ID.
login_persona = "<PERSONA_ID>"

# Gen-2 defaults (if omitted): max_steps=50, token_budget=400000, wrap@80%.
# Pin lower for signing micro-scenarios; raise for hub/workspace evaluation.
time_budget_seconds = 600
max_steps = 50
token_budget = 400000

# Optional. Relative URL the persona lands on after login (default /app).
# Set when the trial targets a specific region/workspace — region cards
# emit id="region-<name>" anchors. Leave unset for whole-app discovery.
# starting_url = "/app/workspaces/<WORKSPACE>#region-<REGION>"

# First-person narrative. Name, role, company, current tooling, decision
# at stake. Specific > generic. Include that they will try one recovery
# path before writing something off.
user_identity = """
You are <NAME>, <ROLE> at <COMPANY_DESCRIPTION>. You <CURRENT_WORKFLOW>
but it's <WHAT_HURTS>. You're trialling this software today to decide
whether <DECISION_AT_STAKE — e.g. two-week pilot with teammate X>.

You're logged in as the "<PERSONA_ID>" account — the same role you'd
use in production. You evaluate carefully, not as a five-minute skim.
"""

# Numbers and pressures that anchor prioritisation.
business_context = """
You <VOLUME_METRIC>. About <PERCENTAGE> are <HIGH_STAKES_CATEGORY>,
<PERCENTAGE> are <MEDIUM>, and the rest are <LOW>. You care about
<WHAT_BREAKS_TRUST_IF_MISSED>. A pilot fails if <PILOT_FAILURE_MODE>.
"""

# Goals, not click-paths.
tasks = [
    "<GOAL_ONE_AS_A_QUESTION_THE_USER_IS_ASKING_THE_SOFTWARE>",
    "<GOAL_TWO_PROBABLY_A_FILTER_OR_SORT_NEED>",
    "<GOAL_THREE_MAYBE_A_CROSS_ENTITY_QUESTION>",
    "Stress lightly: if an empty or filtered state appears, can you tell why and recover?",
]

# Optional multi-phase guide (injected into the agent prompt).
phases = [
    "Orient — first impression of the primary workspace",
    "Core jobs — the tasks above",
    "Light stress — empty/filter/error recovery if encountered",
    "Decide — score adoption criteria and submit_verdict",
]

# Optional. Agent should score each in submit_verdict.criteria_scores.
adoption_criteria = [
    "<CRITERION_ONE_PILOT_RELEVANT>",
    "<CRITERION_TWO_DISCOVERABILITY_OR_URGENCY>",
    "Would run a two-week pilot as-is or with minor fixes",
]

stop_when = """
Stop when you can score the adoption criteria and form a pilot decision
(yes / conditional / no). Prefer depth on the criteria over exhaustive
feature tourism. Call submit_verdict with recommend=yes|no|conditional,
criteria_scores (pass|partial|fail|untested), and pilot_blockers_summary
if any.
"""

# Optional: second persona / decision.
# [[scenario]]
# name = "<SECOND_SCENARIO_NAME>"
# ...
